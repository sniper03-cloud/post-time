<body>
  <div class="lily-bg grain">
    <div class="container">
      <div id="app"></div>
    </div>
  </div>

  <div id="installPrompt">
    <div style="font-size: 0.875rem;">Install Post Time as an app</div>
    <div style="display: flex; gap: 0.5rem;">
      <button id="installBtn">Install</button>
      <button id="dismissInstall" style="background: transparent; color: #a8a29e; border: 1px solid #44403c;">Later</button>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const MODELS = {
      haiku: { id: 'claude-haiku-4-5-20251001', name: 'Haiku 4.5', priceNote: '~$0.50 / race', desc: 'Fast and cheap. Low-stakes races.' },
      sonnet: { id: 'claude-sonnet-4-5', name: 'Sonnet 4.5', priceNote: '~$1.50 / race', desc: 'Recommended default. Strong analysis.' },
      opus: { id: 'claude-opus-4-7', name: 'Opus 4.7', priceNote: '~$3-5 / race', desc: 'Deepest research. For stakes and big bets.' }
    };

    // Storage helpers — PP data (historical)
    const ppStorageKey = (trackSlug, date, raceNum) => `pp:${trackSlug}:${date}:race${raceNum}`;
    const savePPData = (trackSlug, date, raceNum, data) => {
      try { localStorage.setItem(ppStorageKey(trackSlug, date, raceNum), JSON.stringify(data)); return true; }
      catch (e) { console.error('Storage failed:', e); return false; }
    };
    const loadPPData = (trackSlug, date, raceNum) => {
      try { const s = localStorage.getItem(ppStorageKey(trackSlug, date, raceNum)); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };
    const getRacesWithPP = (trackSlug, date) => {
      const races = new Map();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`pp:${trackSlug}:${date}:race`)) {
          const m = key.match(/race(\d+)$/);
          if (m) {
            try {
              const data = JSON.parse(localStorage.getItem(key));
              races.set(parseInt(m[1]), data.source || 'photo');
            } catch (e) { races.set(parseInt(m[1]), 'photo'); }
          }
        }
      }
      return races;
    };

    // Storage helpers — live tote odds (ephemeral)
    const oddsStorageKey = (trackSlug, date, raceNum) => `odds:${trackSlug}:${date}:race${raceNum}`;
    const saveOddsData = (trackSlug, date, raceNum, data) => {
      try {
        const payload = { ...data, capturedAt: Date.now() };
        localStorage.setItem(oddsStorageKey(trackSlug, date, raceNum), JSON.stringify(payload));
        return true;
      }
      catch (e) { console.error('Odds storage failed:', e); return false; }
    };
    const loadOddsData = (trackSlug, date, raceNum) => {
      try { const s = localStorage.getItem(oddsStorageKey(trackSlug, date, raceNum)); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };
    const getOddsFreshness = (odds) => {
      if (!odds || !odds.capturedAt) return null;
      const ageMs = Date.now() - odds.capturedAt;
      const ageMin = Math.floor(ageMs / 60000);
      return { ageMin, stale: ageMin > 30, veryStale: ageMin > 120 };
    };

    // Parse odds in various formats to decimal (e.g. "5-2" or "5/2" => 2.5, "2" => 2, "1/2" => 0.5)
    const parseOdds = (str) => {
      if (str === null || str === undefined) return null;
      const s = String(str).trim();
      if (!s) return null;
      // Fractional "5-2" or "5/2"
      const frac = s.match(/^(\d+(?:\.\d+)?)\s*[-\/]\s*(\d+(?:\.\d+)?)$/);
      if (frac) {
        const n = parseFloat(frac[1]), d = parseFloat(frac[2]);
        if (d === 0) return null;
        return n / d;
      }
      // Decimal "2.5" or "12"
      const dec = parseFloat(s);
      if (!isNaN(dec)) return dec;
      return null;
    };

    // Tote odds to implied probability (unnormalized)
    const oddsToImplied = (oddsStr) => {
      const decimal = parseOdds(oddsStr);
      if (decimal === null) return null;
      return 1 / (decimal + 1);
    };

    // v7.1: Nav state persistence — remember where user was across app opens
    const NAV_KEY = 'postTime_nav';
    const saveNavState = (state) => {
      try { localStorage.setItem(NAV_KEY, JSON.stringify({ ...state, savedAt: new Date().toISOString() })); }
      catch (e) { /* ignore */ }
    };
    const loadNavState = () => {
      try { const s = localStorage.getItem(NAV_KEY); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };

    // v7.1: Analysis persistence — save completed deep-dive so we can show on reopen
    const analysisStorageKey = (trackSlug, date, raceNum) => `analysis:${trackSlug}:${date}:race${raceNum}`;
    const saveAnalysisData = (trackSlug, date, raceNum, analysis, conditions, entries, horses, raceCard, selectedTrack, selectedRace) => {
      try {
        localStorage.setItem(analysisStorageKey(trackSlug, date, raceNum), JSON.stringify({
          analysis, conditions, entries, horses, raceCard, selectedTrack, selectedRace,
          timestamp: new Date().toISOString()
        }));
        return true;
      } catch (e) { console.error('Analysis save failed:', e); return false; }
    };
    const loadAnalysisData = (trackSlug, date, raceNum) => {
      try { const s = localStorage.getItem(analysisStorageKey(trackSlug, date, raceNum)); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };
    // Format age of a timestamp as "3m ago" / "2h 15m ago" / "Apr 20"
    const formatAge = (isoString) => {
      if (!isoString) return null;
      const mins = Math.floor((Date.now() - new Date(isoString).getTime()) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(isoString).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    // ================================================================
    // Brisnet Single File Parser
    // ================================================================
    // The Brisnet "Single File" PP format is a comma-delimited file with ~1400 fields per horse.
    // Most fields are positional (field N = specific data point). We parse the handicapping-critical
    // subset. Values are 1-indexed in Brisnet docs; our array is 0-indexed so subtract 1.
    //
    // Reference: https://support.brisnet.com/hc/en-us/articles/360056092092
    //
    // Key field ranges we use:
    //   1-24:     Today's race info (track, date, race#, distance, surface, type, purse, etc.)
    //   25-70:    Horse identification (name, age, sex, pedigree, connections, weight, meds)
    //   71-100:   Today's odds, morning line, program number
    //   101-200:  Lifetime, year, surface, track, distance records; BRIS speed/class figures
    //   256-355:  Last 10 races: date, track, race#, surface, distance, etc.
    //   456-555:  Last 10 races: beyer/bris speed, pace figures
    //   556-655:  Last 10 races: finish position, beaten lengths
    //   656-755:  Last 10 races: trip comments
    //   1056-1075: Trainer name per race
    //   1066-1085: Jockey name per race
    //   1177-1181: Best BRIS speeds by surface
    //   1328-1330: Best BRIS speed life/year

    const BRIS_FIELD = {
      // *** Today's Race Data (fields 1-27) ***
      track: 1, date: 2, raceNum: 3, postPosition: 4, entry: 5,
      distanceYards: 6, surface: 7, /* 8 reserved */ raceType: 9,
      ageSexRestrictions: 10, classification: 11, purse: 12,
      claimingPrice: 13, horseClaimingPrice: 14, trackRecord: 15,
      raceConditions: 16, todayLasixList: 17, todayButeList: 18,
      todayCoupledList: 19, todayMutuelList: 20, simulcastHost: 21,
      simulcastRace: 22, breedType: 23, nasalStrip: 24, allWeather: 25,

      // *** Today's Horse/Trainer/Jockey/Owner (28-44) ***
      currentTrainer: 28, trainerStartsMeet: 29, trainerWinsMeet: 30,
      trainerPlacesMeet: 31, trainerShowsMeet: 32,
      currentJockey: 33, apprenticeAllowance: 34,
      jockeyStartsMeet: 35, jockeyWinsMeet: 36,
      jockeyPlacesMeet: 37, jockeyShowsMeet: 38,
      owner: 39, ownerSilks: 40, mainTrackOnlyAE: 41,
      // field 42 reserved
      programNumber: 43,
      morningLineOdds: 44,   // NUMERIC 999.99 — IMPORTANT: this is field 44, not 61

      // *** Horse History Data (45-58) ***
      horseName: 45,         // CHARACTER(25)
      yearOfBirth: 46,       // NUMERIC(2) two-digit
      foalMonth: 47,
      // field 48 reserved
      sex: 49,
      horseColor: 50,
      weight: 51,            // NUMERIC(3) — weight carried TODAY
      sire: 52,
      sireSire: 53,
      dam: 54,
      damSire: 55,
      breeder: 56,
      stateBred: 57,         // State/Country where bred
      programPostPosition: 58, // Updated post after scratches
      // 59-61 reserved

      // *** Current Horse Stats (62-101) ***
      medication: 62,        // NUMERIC(2) w/first-time Lasix: 0-5, 9
      medicationOld: 63,     // NUMERIC(1) legacy
      equipmentChange: 64,   // 0=none, 1=blinkers on, 2=off

      // Lifetime @ today's distance (65-69)
      distanceStarts: 65, distanceWins: 66, distancePlaces: 67,
      distanceShows: 68, distanceEarnings: 69,

      // Lifetime @ today's track (70-74)
      trackStarts: 70, trackWins: 71, trackPlaces: 72,
      trackShows: 73, trackEarnings: 74,

      // Turf record (75-79)
      turfStarts: 75, turfWins: 76, turfPlaces: 77,
      turfShows: 78, turfEarnings: 79,

      // Wet record (80-84)
      wetStarts: 80, wetWins: 81, wetPlaces: 82,
      wetShows: 83, wetEarnings: 84,

      // Current year (85-90) — note: field 85 is the YEAR label
      currentYear: 85, currentYearStarts: 86, currentYearWins: 87,
      currentYearPlaces: 88, currentYearShows: 89, currentYearEarnings: 90,

      // Previous year (91-96)
      previousYear: 91, previousYearStarts: 92, previousYearWins: 93,
      previousYearPlaces: 94, previousYearShows: 95, previousYearEarnings: 96,

      // Lifetime record (97-101)
      lifetimeStarts: 97, lifetimeWins: 98, lifetimePlaces: 99,
      lifetimeShows: 100, lifetimeEarnings: 101,

      // *** Workouts (102-209) — 12 slots each ***
      workoutDate: 102,         // 102-113 — CYMD format
      workoutTime: 114,         // 114-125 — negative = bullet
      workoutTrack: 126,        // 126-137
      workoutDistance: 138,     // 138-149 (yards, - for about)
      workoutCondition: 150,    // 150-161
      workoutDescription: 162,  // 162-173 — H/B + g + D
      workoutTrackType: 174,    // 174-185 — MT/IM/TT etc
      workoutNumWorks: 186,     // 186-197 — # works that day/dist
      workoutRank: 198,         // 198-209 — "N of M" style rank

      // *** Pace / Bias (210-224) ***
      brisRunStyle: 210,        // E/EP/P/S etc — KEY for pace
      quirinSpeedPoints: 211,   // 0-8 — KEY for pace
      /* 212-213 reserved */
      brisPacePar2f: 214, brisPacePar4f: 215, brisPacePar6f: 216,
      brisSpeedParClass: 217, brisLatePacePar: 218,
      tjCombo365Starts: 219, tjCombo365Wins: 220,
      tjCombo365Places: 221, tjCombo365Shows: 222, tjCombo365ROI: 223,
      daysSinceLastRace: 224,

      // Race conditions extended (225-230) — mostly 1st-horse-only

      // All-weather record (231-236)
      awStarts: 231, awWins: 232, awPlaces: 233,
      awShows: 234, awEarnings: 235, awBestBrisSpeed: 236,

      // Today's race extras (238-250)
      lowClaimingPrice: 238, statebredFlag: 239,
      // 240-248 wager types
      // 249-250 reserved

      // THE NUMBER
      brisPrimePower: 251,      // NUMERIC(999.99) — Brisnet's flagship

      // *** PAST PERFORMANCES (10 races deep) — base fields ***
      // Each is an array of 10 slots (most recent → oldest)
      ppDate: 256,              // CYMD
      ppDaysSincePrev: 266,
      // 275 reserved
      ppTrackCode: 276,         // long track code
      ppBrisTrackCode: 286,     // 3-char BRIS code
      ppRaceNum: 296,
      ppTrackCondition: 306,
      ppDistanceYards: 316,
      ppSurface: 326,           // see field #7
      ppSpecialChute: 336,
      ppNumEntrants: 346,
      ppPostPosition: 356,
      ppEquipment: 366,         // b - blinkers
      ppRaceName: 376,
      ppMedication: 386,
      ppTripComment: 396,       // 100 chars
      ppWinnerName: 406,
      pp2ndPlaceName: 416,
      pp3rdPlaceName: 426,
      ppWinnerWeight: 436,
      pp2ndPlaceWeight: 446,
      pp3rdPlaceWeight: 456,
      ppWinnerMargin: 466,
      pp2ndMargin: 476,
      pp3rdMargin: 486,
      ppAlternateComment: 496,
      ppWeight: 506,
      ppOdds: 516,
      ppPpEntry: 526,
      ppRaceClassification: 536,
      ppHorseClaimingPrice: 546,
      ppRacePurse: 556,
      ppStartCallPos: 566,
      pp1stCallPos: 576,
      pp2ndCallPos: 586,
      ppGateCallPos: 596,       // 5/2002
      ppStretchCallPos: 606,
      ppFinishPos: 616,
      ppMoneyPos: 626,
      ppStartBtnLngths: 636,    // vs leader margin
      ppStartBtnLngthsOnly: 646,
      pp1stBtnLngths: 656,
      pp1stBtnLngthsOnly: 666,
      pp2ndBtnLngths: 676,
      pp2ndBtnLngthsOnly: 686,
      ppBrisRaceShape1: 696,    // 2/07 update
      // 706-715 reserved
      ppStretchBtnLngths: 716,
      ppStretchBtnLngthsOnly: 726,
      ppFinishBtnLngths: 736,   // vs winner margin
      ppFinishBtnLngthsOnly: 746,
      ppBrisRaceShape2: 756,
      ppBrisPace2f: 766,
      ppBrisPace4f: 776,
      ppBrisPace6f: 786,
      ppBrisPace8f: 796,
      ppBrisPace10f: 806,
      ppBrisLatePace: 816,
      // 826-845 reserved
      ppBrisSpeedRating: 846,   // *** KEY — this is the BRIS speed fig (~Beyer)
      ppSpeedRating: 856,       // older Speed Rating
      ppTrackVariant: 866,
      pp2fFraction: 876,
      pp3fFraction: 886,
      pp4fFraction: 896,
      pp5fFraction: 906,
      pp6fFraction: 916,
      pp7fFraction: 926,
      pp8fFraction: 936,
      pp10fFraction: 946,
      pp12fFraction: 956,
      pp14fFraction: 966,
      pp16fFraction: 976,
      ppFraction1: 986,
      ppFraction2: 996,
      ppFraction3: 1006,
      // 1016-1035 reserved
      ppFinalTime: 1036,
      ppClaimedCode: 1046,
      ppTrainer: 1056,
      ppJockey: 1066,

    };

    // CSV parser that handles quoted strings with commas
    const parseCSVLine = (line) => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result.map(s => s.trim());
    };

    // Get field value (1-indexed). Returns null if empty.
    const getField = (row, fieldNum) => {
      if (fieldNum - 1 >= row.length) return null;
      const v = row[fieldNum - 1];
      if (v === undefined || v === null || v === '') return null;
      return v;
    };

    // Get numeric field, return null if not a valid number
    const getNumField = (row, fieldNum) => {
      const v = getField(row, fieldNum);
      if (v === null) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    };

    // Convert yards to human-readable distance. Handles US standard distances.
    const yardsToDistance = (yards) => {
      if (!yards) return null;
      const abs = Math.abs(yards);
      // Standard US route distances (within 10yd tolerance for BrisNet rounding)
      const standards = [
        { yards: 1320, name: '6 Furlongs' },
        { yards: 1430, name: '6 1/2 Furlongs' },
        { yards: 1540, name: '7 Furlongs' },
        { yards: 1650, name: '7 1/2 Furlongs' },
        { yards: 1760, name: '1 mile' },
        { yards: 1870, name: '1 1/16 miles' },
        { yards: 1980, name: '1 1/8 miles' },
        { yards: 2090, name: '1 3/16 miles' },
        { yards: 2200, name: '1 1/4 miles' },
        { yards: 2310, name: '1 5/16 miles' },
        { yards: 2420, name: '1 3/8 miles' },
        { yards: 2640, name: '1 1/2 miles' },
        { yards: 2860, name: '1 5/8 miles' },
        { yards: 3080, name: '1 3/4 miles' },
        { yards: 3300, name: '1 7/8 miles' },
        { yards: 3520, name: '2 miles' },
        { yards: 880, name: '4 Furlongs' },
        { yards: 990, name: '4 1/2 Furlongs' },
        { yards: 1100, name: '5 Furlongs' },
        { yards: 1210, name: '5 1/2 Furlongs' }
      ];
      for (const s of standards) {
        if (Math.abs(abs - s.yards) <= 10) return s.name;
      }
      // Fallback: compute in furlongs
      const furlongs = abs / 220;
      if (furlongs >= 8) return `${(abs / 1760).toFixed(2)} miles`;
      if (furlongs === Math.floor(furlongs)) return `${furlongs} Furlongs`;
      return `${furlongs.toFixed(1)} Furlongs`;
    };

    const surfaceCodeToName = (code) => {
      const map = { 'D': 'Dirt', 'd': 'Inner Dirt', 'T': 'Turf', 't': 'Inner Turf', 's': 'Steeplechase', 'h': 'Hunt', 'A': 'All Weather' };
      return map[code] || code || 'Unknown';
    };

    const raceTypeToName = (code) => {
      const map = {
        'G1': 'Grade I Stakes', 'G2': 'Grade II Stakes', 'G3': 'Grade III Stakes',
        'N': 'Non-graded Stakes', 'A': 'Allowance', 'R': 'Starter Allowance',
        'T': 'Starter Handicap', 'C': 'Claiming', 'CO': 'Optional Claiming',
        'S': 'Maiden Special Weight', 'M': 'Maiden Claiming',
        'AO': 'Allowance Optional Claiming', 'MO': 'Maiden Optional Claiming',
        'NO': 'Optional Claiming Stakes'
      };
      return map[code] || code || 'Unknown';
    };

    // Parse a single horse row into our app's PP data schema
    const parseBrisnetRow = (row) => {
      const yob = getNumField(row, BRIS_FIELD.yearOfBirth);
      let age = null;
      if (yob !== null) {
        const fullYear = yob < 50 ? 2000 + yob : 1900 + yob;

      const medCode = getNumField(row, BRIS_FIELD.medication);

      const eqCode = getNumField(row, BRIS_FIELD.equipmentChange);
      const eqMap = { 0: null, 1: 'Blinkers on', 2: 'Blinkers off', 9: null };
      const equipmentChange = eqCode !== null ? eqMap[eqCode] : null;

      const horse = {
        // Identity
        postPosition: getField(row, BRIS_FIELD.postPosition),
        programNumber: getField(row, BRIS_FIELD.programNumber),
        programPostPosition: getField(row, BRIS_FIELD.programPostPosition),
        horseName: getField(row, BRIS_FIELD.horseName),
        age,
        sex: getField(row, BRIS_FIELD.sex),
        color: getField(row, BRIS_FIELD.horseColor),
        weight: getNumField(row, BRIS_FIELD.weight),
        morningLine: getNumField(row, BRIS_FIELD.morningLineOdds),
        medication,
        equipmentChange,
        entry: getField(row, BRIS_FIELD.entry),
        scratched: getField(row, BRIS_FIELD.entry) === 'S',

        // Pedigree
        sire: getField(row, BRIS_FIELD.sire),
        sireSire: getField(row, BRIS_FIELD.sireSire),
        dam: getField(row, BRIS_FIELD.dam),
        damSire: getField(row, BRIS_FIELD.damSire),
        breeder: getField(row, BRIS_FIELD.breeder),
        stateBred: getField(row, BRIS_FIELD.stateBred),
        auctionPrice: getField(row, BRIS_FIELD.auctionPrice),
        auctionInfo: getField(row, BRIS_FIELD.auctionInfo),
        sireStudFee: getField(row, BRIS_FIELD.sireStudFee),

        // Connections today
        jockey: getField(row, BRIS_FIELD.currentJockey),
        trainer: getField(row, BRIS_FIELD.currentTrainer),
        owner: getField(row, BRIS_FIELD.owner),
        apprenticeAllowance: getNumField(row, BRIS_FIELD.apprenticeAllowance),

        // KEY PACE FIELDS — critical for analysis
        brisRunStyle: getField(row, BRIS_FIELD.brisRunStyle),           // E / EP / P / S
        quirinSpeedPoints: getNumField(row, BRIS_FIELD.quirinSpeedPoints), // 0-8

        // KEY COMPOSITE NUMBER
        brisPrimePower: getNumField(row, BRIS_FIELD.brisPrimePower),

        // BRIS Pace Pars for class
        paceParClass: {
          pace2f: getNumField(row, BRIS_FIELD.brisPacePar2f),
          pace4f: getNumField(row, BRIS_FIELD.brisPacePar4f),
          pace6f: getNumField(row, BRIS_FIELD.brisPacePar6f),
          speed: getNumField(row, BRIS_FIELD.brisSpeedParClass),
          latePace: getNumField(row, BRIS_FIELD.brisLatePacePar)
        },

        daysSinceLastRace: getNumField(row, BRIS_FIELD.daysSinceLastRace),

        // Pedigree ratings
        pedigreeRatings: {
          dirt: getField(row, BRIS_FIELD.brisDirtPedigree),
          mud: getField(row, BRIS_FIELD.brisMudPedigree),
          turf: getField(row, BRIS_FIELD.brisTurfPedigree),
          distance: getField(row, BRIS_FIELD.brisDistPedigree)
        },

        // Records
        lifetimeRecord: {
          starts: getNumField(row, BRIS_FIELD.lifetimeStarts),
          wins: getNumField(row, BRIS_FIELD.lifetimeWins),
          places: getNumField(row, BRIS_FIELD.lifetimePlaces),
          shows: getNumField(row, BRIS_FIELD.lifetimeShows),
          earnings: getField(row, BRIS_FIELD.lifetimeEarnings),
          topBeyer: getNumField(row, BRIS_FIELD.bestBrisSpeedLife)
        },
        currentYearRecord: {
          year: getNumField(row, BRIS_FIELD.currentYear),
          starts: getNumField(row, BRIS_FIELD.currentYearStarts),
          wins: getNumField(row, BRIS_FIELD.currentYearWins),
          places: getNumField(row, BRIS_FIELD.currentYearPlaces),
          shows: getNumField(row, BRIS_FIELD.currentYearShows),
          earnings: getField(row, BRIS_FIELD.currentYearEarnings)
        },
        previousYearRecord: {
          year: getNumField(row, BRIS_FIELD.previousYear),
          starts: getNumField(row, BRIS_FIELD.previousYearStarts),
          wins: getNumField(row, BRIS_FIELD.previousYearWins),
          places: getNumField(row, BRIS_FIELD.previousYearPlaces),
          shows: getNumField(row, BRIS_FIELD.previousYearShows),
          earnings: getField(row, BRIS_FIELD.previousYearEarnings)
        },
        trackRecord: {
          starts: getNumField(row, BRIS_FIELD.trackStarts),
          wins: getNumField(row, BRIS_FIELD.trackWins),
          places: getNumField(row, BRIS_FIELD.trackPlaces),
          shows: getNumField(row, BRIS_FIELD.trackShows),
          earnings: getField(row, BRIS_FIELD.trackEarnings)
        },
        distanceRecord: {
          starts: getNumField(row, BRIS_FIELD.distanceStarts),
          wins: getNumField(row, BRIS_FIELD.distanceWins),
          places: getNumField(row, BRIS_FIELD.distancePlaces),
          shows: getNumField(row, BRIS_FIELD.distanceShows),
          earnings: getField(row, BRIS_FIELD.distanceEarnings)
        },
        turfRecord: {
          starts: getNumField(row, BRIS_FIELD.turfStarts),
          wins: getNumField(row, BRIS_FIELD.turfWins),
          places: getNumField(row, BRIS_FIELD.turfPlaces),
          shows: getNumField(row, BRIS_FIELD.turfShows),
          earnings: getField(row, BRIS_FIELD.turfEarnings)
        },
        wetRecord: {
          starts: getNumField(row, BRIS_FIELD.wetStarts),
          wins: getNumField(row, BRIS_FIELD.wetWins),
          places: getNumField(row, BRIS_FIELD.wetPlaces),
          shows: getNumField(row, BRIS_FIELD.wetShows),
          earnings: getField(row, BRIS_FIELD.wetEarnings)
        },
        fastDirtRecord: {
          starts: getNumField(row, BRIS_FIELD.fastDirtStarts),
          wins: getNumField(row, BRIS_FIELD.fastDirtWins),
          places: getNumField(row, BRIS_FIELD.fastDirtPlaces),

          earnings: getField(row, BRIS_FIELD.fastDirtEarnings)
        },
        brisSpeedFigures: {
          bestLife: getNumField(row, BRIS_FIELD.bestBrisSpeedLife),
          bestYear: getNumField(row, BRIS_FIELD.bestBrisSpeedYear),
          best2ndYear: getNumField(row, BRIS_FIELD.bestBrisSpeed2ndYear),
          bestThisTrack: getNumField(row, BRIS_FIELD.bestBrisSpeedThisTrack),
          bestFast: getNumField(row, BRIS_FIELD.bestBrisSpeedFast),
          bestTurf: getNumField(row, BRIS_FIELD.bestBrisSpeedTurf),

        },
        trainerStats: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.trainerStartsMeet),

        // KEY Trainer Angle Categories (label + W%/ITM/ROI)
        trainerAngles: [1, 2, 3, 4, 5, 6].map(n => {
          const labelField = BRIS_FIELD['trnStatCat' + n + 'Label'] || (BRIS_FIELD.trnStatCat1Label + (n - 1) * 5);
          return {
            label: getField(row, labelField),
            starts: getNumField(row, labelField + 1),
            winPct: getNumField(row, labelField + 2),

        jockeyStats: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.jockeyStartsMeet),
            wins: getNumField(row, BRIS_FIELD.jockeyWinsMeet),
            places: getNumField(row, BRIS_FIELD.jockeyPlacesMeet),
            shows: getNumField(row, BRIS_FIELD.jockeyShowsMeet)
          }
        },
        jockeyTrainerCombo: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.tjComboMeetStarts),
            wins: getNumField(row, BRIS_FIELD.tjComboMeetWins),
            places: getNumField(row, BRIS_FIELD.tjComboMeetPlaces),
            shows: getNumField(row, BRIS_FIELD.tjComboMeetShows),
            roi: getNumField(row, BRIS_FIELD.tjComboMeetROI)
          },
          last365: {
            starts: getNumField(row, BRIS_FIELD.tjCombo365Starts),
            wins: getNumField(row, BRIS_FIELD.tjCombo365Wins),
            places: getNumField(row, BRIS_FIELD.tjCombo365Places),
            shows: getNumField(row, BRIS_FIELD.tjCombo365Shows),

      };

      // Parse past performances (10 back, most recent first)
      horse.pastPerformances = [];
      for (let i = 0; i < 10; i++) {
        const date = getField(row, BRIS_FIELD.ppDate + i);
        if (!date) continue;
        const distYards = getNumField(row, BRIS_FIELD.ppDistanceYards + i);
        const pp = {
          date: date,
          daysSincePrev: getNumField(row, BRIS_FIELD.ppDaysSincePrev + i),
          trackCode: getField(row, BRIS_FIELD.ppTrackCode + i),

          raceNum: getNumField(row, BRIS_FIELD.ppRaceNum + i),

          distance: yardsToDistance(distYards),

          raceClassification: getField(row, BRIS_FIELD.ppRaceClassification + i),
          beyerFig: getNumField(row, BRIS_FIELD.ppBrisSpeedRating + i), // BRIS Speed = equivalent of Beyer
          oldSpeedRating: getNumField(row, BRIS_FIELD.ppSpeedRating + i),
          trackVariant: getNumField(row, BRIS_FIELD.ppTrackVariant + i),
          tripComment: getField(row, BRIS_FIELD.ppTripComment + i),
          altComment: getField(row, BRIS_FIELD.ppAlternateComment + i),
          // Placings
          winner: getField(row, BRIS_FIELD.ppWinnerName + i),
          winnerWeight: getNumField(row, BRIS_FIELD.ppWinnerWeight + i),
          winnerMargin: getNumField(row, BRIS_FIELD.ppWinnerMargin + i),
          secondPlace: getField(row, BRIS_FIELD.pp2ndPlaceName + i),
          secondPlaceWeight: getNumField(row, BRIS_FIELD.pp2ndPlaceWeight + i),
          thirdPlace: getField(row, BRIS_FIELD.pp3rdPlaceName + i),
          thirdPlaceWeight: getNumField(row, BRIS_FIELD.pp3rdPlaceWeight + i),
          // Horse's performance
          finishPosition: getField(row, BRIS_FIELD.ppFinishPos + i),
          moneyPosition: getField(row, BRIS_FIELD.ppMoneyPos + i),
          beatenLengths: (() => {
            const v = getNumField(row, BRIS_FIELD.ppFinishBtnLngthsOnly + i);
            if (v !== null) return v;
            // If the horse won (finish = 1), beaten lengths = 0 even if the field is blank
            const finish = getField(row, BRIS_FIELD.ppFinishPos + i);
            if (finish === '1') return 0;
            return null;
          })(),
          odds: getNumField(row, BRIS_FIELD.ppOdds + i),
          weight: getNumField(row, BRIS_FIELD.ppWeight + i),
          purse: getNumField(row, BRIS_FIELD.ppRacePurse + i),
          finalTime: getNumField(row, BRIS_FIELD.ppFinalTime + i),
          jockey: getField(row, BRIS_FIELD.ppJockey + i),

          favorite: getNumField(row, BRIS_FIELD.ppFavorite + i) === 1,
          fractions: [
            getNumField(row, BRIS_FIELD.ppFraction1 + i),
            getNumField(row, BRIS_FIELD.ppFraction2 + i),
            getNumField(row, BRIS_FIELD.ppFraction3 + i)
          ].filter(v => v !== null),
          brisPace: {
            pace2f: getNumField(row, BRIS_FIELD.ppBrisPace2f + i),
            pace4f: getNumField(row, BRIS_FIELD.ppBrisPace4f + i),
            pace6f: getNumField(row, BRIS_FIELD.ppBrisPace6f + i),
            pace8f: getNumField(row, BRIS_FIELD.ppBrisPace8f + i),
            pace10f: getNumField(row, BRIS_FIELD.ppBrisPace10f + i),
            latePace: getNumField(row, BRIS_FIELD.ppBrisLatePace + i),
            raceShape1: getNumField(row, BRIS_FIELD.ppBrisRaceShape1 + i),
            raceShape2: getNumField(row, BRIS_FIELD.ppBrisRaceShape2 + i)
          },
          callPositions: {
            start: getField(row, BRIS_FIELD.ppStartCallPos + i),
            first: getField(row, BRIS_FIELD.pp1stCallPos + i),
            second: getField(row, BRIS_FIELD.pp2ndCallPos + i),
            gate: getField(row, BRIS_FIELD.ppGateCallPos + i),
            stretch: getField(row, BRIS_FIELD.ppStretchCallPos + i)
          },
          beatenLengthsAtCall: {
            start: getNumField(row, BRIS_FIELD.ppStartBtnLngthsOnly + i),
            first: getNumField(row, BRIS_FIELD.pp1stBtnLngthsOnly + i),
            second: getNumField(row, BRIS_FIELD.pp2ndBtnLngthsOnly + i),
            stretch: getNumField(row, BRIS_FIELD.ppStretchBtnLngthsOnly + i)
          }
        };

        // Build running line in DRF-ish format
        const cp = pp.callPositions;
        const bl = pp.beatenLengthsAtCall;
        const seg = (pos, btn) => pos ? (btn != null && btn !== 0 ? `${pos}-${btn}` : pos) : null;
        const parts = [];
        const s1 = seg(cp.start, bl.start); if (s1) parts.push(s1);
        const s2 = seg(cp.first, bl.first); if (s2) parts.push(s2);
        const s3 = seg(cp.second, bl.second); if (s3) parts.push(s3);
        const s4 = seg(cp.stretch, bl.stretch); if (s4) parts.push(s4);
        if (pp.finishPosition) {
          parts.push(`${pp.finishPosition}${pp.beatenLengths != null && pp.beatenLengths !== 0 ? `-${pp.beatenLengths}` : ''}`);
        }
        pp.runningLine = parts.join(' ');

        // Build compact top-finishers string
        const topFinishers = [];
        if (pp.winner) topFinishers.push(`${pp.winner}${pp.winnerWeight ? ` ${pp.winnerWeight}` : ''}`);
        if (pp.secondPlace) topFinishers.push(`${pp.secondPlace}${pp.secondPlaceWeight ? ` ${pp.secondPlaceWeight}` : ''}-${pp.winnerMargin || ''}`);
        if (pp.thirdPlace) topFinishers.push(`${pp.thirdPlace}${pp.thirdPlaceWeight ? ` ${pp.thirdPlaceWeight}` : ''}`);
        pp.topFinishers = topFinishers.join(' ');

        horse.pastPerformances.push(pp);
      }

      // Parse workouts (12 back)
      horse.workouts = [];
      for (let i = 0; i < 12; i++) {
        const wDate = getField(row, BRIS_FIELD.workoutDate + i);
        if (!wDate) continue;
        const wTime = getNumField(row, BRIS_FIELD.workoutTime + i);
        const wDist = getNumField(row, BRIS_FIELD.workoutDistance + i);
        horse.workouts.push({
          date: wDate,
          time: wTime,
          bullet: wTime !== null && wTime < 0, // negative time = bullet work
          track: getField(row, BRIS_FIELD.workoutTrack + i),
          distanceYards: wDist,
          distance: yardsToDistance(wDist),
          condition: getField(row, BRIS_FIELD.workoutCondition + i),
          description: getField(row, BRIS_FIELD.workoutDescription + i),
          trackType: getField(row, BRIS_FIELD.workoutTrackType + i),
          numWorks: getNumField(row, BRIS_FIELD.workoutNumWorks + i),
          rank: getField(row, BRIS_FIELD.workoutRank + i)
        });
      }

      return horse;
    };

    // Parse whole Brisnet file into { byRace: { raceNum: { trackName, horses: [...] } } }
    const parseBrisnetFile = (text, trackSlug, expectedDate) => {
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      const byRace = {};
      let trackCode = null;
      let parseErrors = [];

      for (const line of lines) {
        try {
          const row = parseCSVLine(line);
          const rowTrack = getField(row, BRIS_FIELD.track);
          const rowRace = getNumField(row, BRIS_FIELD.raceNum);
          const rowDate = getField(row, BRIS_FIELD.date);
          if (!rowRace) continue;

          if (!trackCode) trackCode = rowTrack;

          if (!byRace[rowRace]) {
            byRace[rowRace] = {
              raceNumber: rowRace,
              trackCode: rowTrack,
              date: rowDate,
              distance: yardsToDistance(getNumField(row, BRIS_FIELD.distanceYards)),
              distanceYards: getNumField(row, BRIS_FIELD.distanceYards),
              surface: surfaceCodeToName(getField(row, BRIS_FIELD.surface)),
              raceType: raceTypeToName(getField(row, BRIS_FIELD.raceType)),
              classification: getField(row, BRIS_FIELD.classification),
              purse: getNumField(row, BRIS_FIELD.purse),
              claimingPrice: getNumField(row, BRIS_FIELD.claimingPrice),
              conditions: getField(row, BRIS_FIELD.raceConditions),
              trackRecord: getNumField(row, BRIS_FIELD.trackRecord),
              horses: []
            };
          }

          const horse = parseBrisnetRow(row);
          byRace[rowRace].horses.push(horse);
        } catch (e) {
          parseErrors.push(`Line: ${line.substring(0, 50)}... — ${e.message}`);
        }
      }

      return { byRace, trackCode, parseErrors };
    };

    const callClaude = async ({ apiKey, modelId, prompt, imageData, useWebFetch = false, useWebSearch = false, maxTokens = 8000, _retryCount = 0 }) => {
      const tools = [];
      const headers = {
        "Content-Type": "application/json",
        "x-api-key": apiKey.trim(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      };
      if (useWebFetch) { tools.push({ type: "web_fetch_20250910", name: "web_fetch", max_uses: 3 }); headers["anthropic-beta"] = "web-fetch-2025-09-10"; }
      if (useWebSearch) tools.push({ type: "web_search_20250305", name: "web_search" });

      // Build content - if images provided, use content array format
      let content;
      if (imageData && imageData.length > 0) {
        content = [
          ...imageData.map(img => ({
            type: "image",
            source: { type: "base64", media_type: img.mediaType, data: img.data }
          })),
          { type: "text", text: prompt }
        ];
      } else {
        content = prompt;
      }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: modelId,
          max_tokens: maxTokens,
          messages: [{ role: "user", content }],
          tools: tools.length > 0 ? tools : undefined
        })
      });

      // v7.1: Auto-retry on rate limit (429) with exponential backoff
      if (response.status === 429 && _retryCount < 3) {
        const waitSec = [15, 30, 60][_retryCount];
        console.warn(`Rate limited (attempt ${_retryCount + 1}/3), waiting ${waitSec}s...`);
        // Dispatch a custom event so UI can show retry status
        window.dispatchEvent(new CustomEvent('claude-retry', { detail: { wait: waitSec, attempt: _retryCount + 1 } }));
        await new Promise(r => setTimeout(r, waitSec * 1000));
        return callClaude({ apiKey, modelId, prompt, imageData, useWebFetch, useWebSearch, maxTokens, _retryCount: _retryCount + 1 });
      }

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 400)}`);
      }

      const data = await response.json();
      const textBlocks = data.content.filter(item => item.type === "text").map(item => item.text).join("\n");
      let cleaned = textBlocks.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      const firstBrace = cleaned.indexOf('{');
      const lastBrace = cleaned.lastIndexOf('}');
      if (firstBrace !== -1 && lastBrace !== -1) cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      try { return { data: JSON.parse(cleaned), usage: data.usage }; }
      catch (e) { console.error('Parse fail:', textBlocks); throw new Error(`Invalid JSON: ${textBlocks.slice(0, 200)}`); }
    };

                    <button style={{ background: 'none', border: 'none', color: '#a8a29e', textDecoration: 'underline', cursor: 'pointer', font: 'inherit', fontSize: '0.8rem', marginTop: '0.5rem', padding: 0 }} onClick={() => { setBrisnetFile(null); setBrisnetPreview(null); }}>Pick a different file</button>

                {brisnetPreview && brisnetPreview.raceCount > 1 && (

                      <label>
                        <input type="radio" checked={importScope === 'all'} onChange={() => setImportScope('all')} disabled={processing} />
                        Whole card ({brisnetPreview.raceCount} races) — recommended
                      </label>
                      <label>
                        <input type="radio" checked={importScope === 'this'} onChange={() => setImportScope('this')} disabled={processing} />
                        Just Race {race.raceNumber}
                      </label>
                    </div>
                  </div>
                )}

                {error && <div className="error-box"><IconAlert /><div>{error}</div></div>}

                {processing ? (
                  <div style={{ textAlign: 'center', padding: '1rem 0', color: '#fcd34d', fontStyle: 'italic', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.75rem' }}>
                    <div className="spinner-amber"></div> {status}
                  </div>
                ) : (
                  <button
                    className="primary-btn"
                    style={{ background: 'linear-gradient(90deg, #fcd34d, #fbbf24, #fcd34d)', marginTop: '0.5rem' }}
                    onClick={runBrisnetImport}
                    disabled={!brisnetPreview}
                  >
                    <IconScan /> Import {importScope === 'all' && brisnetPreview ? `${brisnetPreview.raceCount} Races` : `Race ${race.raceNumber}`}
                  </button>

                <p style={{ fontSize: '0.75rem', color: '#57534e', marginTop: '1rem', textAlign: 'center', fontStyle: 'italic' }}>

            )}

      );
    }

    // ============================================================
    // TOTE SCAN MODAL — captures live odds from TwinSpires screenshot
    // ============================================================
    function ToteScanModal({ apiKey, track, date, race, existing, entries, onClose, onSaved }) {
      const [images, setImages] = useState([]);
      const [previews, setPreviews] = useState([]);
      const [processing, setProcessing] = useState(false);
      const [status, setStatus] = useState('');
      const [error, setError] = useState(null);
      const fileInputRef = useRef(null);

      const handleFiles = async (fileList) => {
        const newFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
        if (newFiles.length === 0) return;
        const newImages = [...images, ...newFiles];
        setImages(newImages);
        const newPreviews = await Promise.all(newImages.map(f => new Promise(res => {
          const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f);
        })));
        setPreviews(newPreviews);
      };

      const removeImage = (idx) => {
        setImages(images.filter((_, i) => i !== idx));
        setPreviews(previews.filter((_, i) => i !== idx));
      };

      const runExtraction = async () => {
        if (images.length === 0) { setError('Add at least one screenshot'); return; }
        setProcessing(true); setError(null); setStatus('Encoding...');

        try {
          const imageData = await Promise.all(images.map(async f => ({
            mediaType: f.type, data: await fileToBase64(f)
          })));

          setStatus('Reading tote data...');

          const horseList = entries?.entries?.filter(e => !e.scratched).map(e => `${e.postPosition}. ${e.horseName}`).join(', ') || 'unknown';

          const prompt = `You are a racing tote data extractor. The image(s) show a TwinSpires (or similar) live tote screen for a horse race.

RACE CONTEXT:
- Track: ${track.name}
- Race: ${race.raceNumber}
- Expected horses: ${horseList}

Extract the LIVE tote data for each horse. Look for:
- Live current odds (typically fractional like "8/5" or "5-2" or decimal like "2.5")
- Pool % (percentage of the win pool, e.g. "3" for 3%)
- Odds movement indicator (up arrow = drifting longer, down arrow = money coming in, if visible)

Note: TwinSpires "ML" column is MORNING LINE — we don't need that. We want the LIVE odds column (often bold, often blue, often with movement arrows next to it).

Return ONLY valid JSON:

{
  "trackName": "${track.name}",
  "raceNumber": ${race.raceNumber},
  "extractedAt": "describe what the screen said (e.g. '27 MTP' = 27 min to post)",
  "source": "twinspires" | "nyrabets" | "track_board" | "other",
  "horses": [
    {
      "postPosition": "1",
      "horseName": "Horse Name",
      "liveOdds": "8/5",
      "poolPct": 3,
      "movement": "up" | "down" | "stable" | null
    }
  ],
  "notes": "Any issues, unreadable areas, or confidence concerns"
}

RULES:
- Use the horse name list above to match horses even if the screenshot text is partially unclear
- If you can't confidently read a horse's odds, use null rather than guess
- Pool % is the number under the "PL" column or "Pool" header (usually a small integer like 3, 22, 40)
- Movement arrows: green-up = drifting (less money), red-down = more money
- Return valid JSON only`;

          const { data } = await callClaude({
            apiKey, modelId: MODELS.sonnet.id, prompt, imageData, maxTokens: 6000
          });

          setStatus('Saving...');
          if (!saveOddsData(track.slug, date, race.raceNumber, data)) throw new Error('Could not save');
          onSaved(data);
          onClose();
        } catch (err) {
          console.error(err);
          setError(`Scan failed: ${err.message}`);
          setProcessing(false); setStatus('');
        }
      };

      const clearExisting = () => {
        if (!confirm('Delete saved tote data for this race?')) return;
        localStorage.removeItem(oddsStorageKey(track.slug, date, race.raceNumber));
        onSaved(null);
        onClose();
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop' && !processing) onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <div>
                <div className="mono-font" style={{ fontSize: '10px', letterSpacing: '0.2em', color: '#c4b5fd', textTransform: 'uppercase', marginBottom: '0.25rem' }}>Capture Live Odds</div>
                <div className="modal-title">Race {race.raceNumber} — Tote Snapshot</div>
              </div>
              <button className="modal-close" onClick={onClose} disabled={processing}><IconX /></button>
            </div>

            {existing && (
              <div className="scanned-summary" style={{ background: 'rgba(168, 85, 247, 0.08)', borderColor: 'rgba(168, 85, 247, 0.3)' }}>
                <strong style={{ color: '#c4b5fd' }}>✓ Odds captured</strong> — {existing.horses?.length || 0} horses. Replace below or <button style={{ background: 'none', border: 'none', color: '#fb7185', textDecoration: 'underline', cursor: 'pointer', font: 'inherit' }} onClick={clearExisting}>delete</button>.
              </div>
            )}

            <p style={{ fontSize: '0.875rem', color: '#a8a29e', marginBottom: '1rem', fontStyle: 'italic' }}>
              Screenshot the <strong style={{ color: '#c4b5fd', fontStyle: 'normal' }}>TwinSpires Advanced tab</strong> (or any live tote board) for Race {race.raceNumber}. Capture close to post time — odds move right until post. Live odds + pool % are what we need; ignore the Speed/Class/Pace tabs.
            </p>

            <label
              className="upload-zone"
              onClick={() => fileInputRef.current?.click()}
              style={{ borderColor: 'rgba(168, 85, 247, 0.4)' }}
            >
              <IconCamera />
              <div style={{ marginTop: '0.5rem', fontFamily: 'Playfair Display, serif', fontSize: '1rem', color: '#c4b5fd' }}>Tap to add screenshot</div>
              <div style={{ marginTop: '0.25rem', fontSize: '0.8rem', color: '#78716c' }}>One screenshot usually enough · {images.length} added</div>
              <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={(e) => handleFiles(e.target.files)} disabled={processing} />
            </label>

            {previews.length > 0 && (
              <div className="image-preview-grid">
                {previews.map((src, idx) => (
                  <div key={idx} className="image-preview">
                    <img src={src} alt={`Screenshot ${idx + 1}`} />
                    <div className="img-num">{idx + 1}</div>
                    {!processing && <button className="remove-img" onClick={() => removeImage(idx)}><IconX /></button>}
                  </div>
                ))}
              </div>
            )}

            {error && <div className="error-box"><IconAlert /><div>{error}</div></div>}

            {processing ? (
              <div style={{ textAlign: 'center', padding: '1rem 0', color: '#c4b5fd', fontStyle: 'italic', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.75rem' }}>
                <div className="spinner-mint" style={{ borderTopColor: '#c4b5fd' }}></div> {status}
              </div>
            ) : (
              <button
                className="primary-btn"
                style={{ background: 'linear-gradient(90deg, #c4b5fd, #a78bfa, #c4b5fd)', marginTop: '0.5rem' }}
                onClick={runExtraction}
                disabled={images.length === 0}
              >
                <IconTote /> Extract Tote Data
              </button>
            )}

            <p style={{ fontSize: '0.75rem', color: '#57534e', marginTop: '1rem', textAlign: 'center', fontStyle: 'italic' }}>
              ~$0.05 per scan · Enables overlay detection
            </p>
          </div>
        </div>
      );
    }

    function App() {
      // v7.1: Restore navigation state from last session
      // Rules: (1) if saved date is in the past, snap to today and clear track/race
      //        (2) otherwise restore exactly where we were
      const savedNav = (() => {
        const s = loadNavState();
        if (!s) return null;
        const today = formatDate(new Date());
        if (s.date && s.date < today) {
          return { view: 'home', date: today, trackSlug: null, trackName: null, raceNumber: null };
        }
        return s;
      })();

      const [view, setView] = useState(savedNav?.view || 'home');
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('postTime_apiKey') || '');
      const [selectedDate, setSelectedDate] = useState(savedNav?.date || formatDate(new Date()));
      const [selectedModel, setSelectedModel] = useState(() => localStorage.getItem('postTime_model') || 'sonnet');

      const [tracksForDay, setTracksForDay] = useState(null);
      // Hydrate selectedTrack stub from saved nav so downstream logic can fetch race card
      const [selectedTrack, setSelectedTrack] = useState(
        savedNav?.trackSlug ? { slug: savedNav.trackSlug, name: savedNav.trackName || savedNav.trackSlug } : null
      );
      const [raceCard, setRaceCard] = useState(null);
      const [selectedRace, setSelectedRace] = useState(
        savedNav?.raceNumber ? { raceNumber: savedNav.raceNumber } : null
      );
      const [entries, setEntries] = useState(null);
      const [horses, setHorses] = useState([]);
      const [conditions, setConditions] = useState(null);
      const [conditionsLoading, setConditionsLoading] = useState(false);
      const [analysis, setAnalysis] = useState(null);
      const [analysisTimestamp, setAnalysisTimestamp] = useState(null);
      const [showReasoning, setShowReasoning] = useState(false);

      // Scan state (historical PP)
      const [scannedRaces, setScannedRaces] = useState(new Map());
      const [scanModalRace, setScanModalRace] = useState(null);
      const [currentPP, setCurrentPP] = useState(null);

      // v7: Tote odds state (live)
      const [currentOdds, setCurrentOdds] = useState(null);
      const [toteModalRace, setToteModalRace] = useState(null);

      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [progress, setProgress] = useState('');
      const [progressSteps, setProgressSteps] = useState([]);
      const [copied, setCopied] = useState(false);

      useEffect(() => { if (apiKey) localStorage.setItem('postTime_apiKey', apiKey); }, [apiKey]);
      useEffect(() => { localStorage.setItem('postTime_model', selectedModel); }, [selectedModel]);

      // v7.1: Persist navigation state on every transition
      useEffect(() => {
        saveNavState({
          view,
          date: selectedDate,
          trackSlug: selectedTrack?.slug || null,
          trackName: selectedTrack?.name || null,
          raceNumber: selectedRace?.raceNumber || null
        });
      }, [view, selectedDate, selectedTrack, selectedRace]);

      // v7.1: Load saved analysis (+ its supporting context) when entering analysis view
      useEffect(() => {
        if (view === 'analysis' && selectedTrack?.slug && selectedRace?.raceNumber && !analysis) {
          const saved = loadAnalysisData(selectedTrack.slug, selectedDate, selectedRace.raceNumber);
          if (saved) {
            setAnalysis(saved.analysis);
            if (saved.conditions) setConditions(saved.conditions);
            if (saved.entries) setEntries(saved.entries);
            if (saved.horses) setHorses(saved.horses);
            if (saved.raceCard) setRaceCard(saved.raceCard);
            // Hydrate track/race fully if we only had stubs
            if (saved.selectedTrack && !selectedTrack.firstPost) setSelectedTrack(saved.selectedTrack);
            if (saved.selectedRace && !selectedRace.distance) setSelectedRace(saved.selectedRace);
            setAnalysisTimestamp(saved.timestamp);
          }
        }
      }, [view, selectedTrack, selectedRace, selectedDate]);

      // v7.1: Browser history integration — back button walks up the view tree and closes modals
      useEffect(() => {
        // Seed history with a known state on first load
        if (!window.history.state || !window.history.state.ptView) {
          window.history.replaceState({ ptView: view }, '', window.location.pathname);
        }
      }, []);

      // Push history entry on every view change (except initial)
      const prevViewRef = useRef(view);
      useEffect(() => {
        if (prevViewRef.current !== view) {
          const currentState = window.history.state;
          if (currentState?.ptView !== view) {
            window.history.pushState({ ptView: view }, '', window.location.pathname);
          }
          prevViewRef.current = view;
        }
      }, [view]);

      // v7.1: When a modal opens, push a marker entry so the back button closes it
      const modalOpen = !!(scanModalRace || toteModalRace);
      const prevModalRef = useRef(false);
      useEffect(() => {
        if (modalOpen && !prevModalRef.current) {
          window.history.pushState({ ptView: view, ptModal: true }, '', window.location.pathname);
        }
        prevModalRef.current = modalOpen;
      }, [modalOpen]);

      // Single popstate handler — close modal first if open, else navigate to the new view
      useEffect(() => {
        const onPopState = (e) => {
          if (scanModalRace || toteModalRace) {
            setScanModalRace(null);
            setToteModalRace(null);
            return;
          }
          const target = e.state?.ptView;
          if (target && target !== view) {
            setView(target);
          } else if (!target) {
            setView('home');
          }
        };
        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, [view, scanModalRace, toteModalRace]);

      // v7.1: Auto-fetch supporting data when restoring a deep view on reopen
      // (only runs once per reopen — triggered by view/selectedTrack/selectedRace being set from savedNav)
      const autoFetchedRef = useRef(false);
      useEffect(() => {
        if (autoFetchedRef.current) return;
        if (!apiKey) return; // need API key
        const needsTracks = (view === 'tracks' || view === 'races' || view === 'entries' || view === 'analysis') && !tracksForDay;
        const needsRaceCard = (view === 'races' || view === 'entries' || view === 'analysis') && selectedTrack?.slug && !raceCard;
        const needsEntries = view === 'entries' && selectedTrack?.slug && selectedRace?.raceNumber && !entries;

        // For analysis view: if saved analysis exists in storage, skip fetching entries (the saved data has it)
        if (view === 'analysis' && selectedTrack?.slug && selectedRace?.raceNumber) {
          const saved = loadAnalysisData(selectedTrack.slug, selectedDate, selectedRace.raceNumber);
          if (saved) {
            // Analysis data exists, the hydrate useEffect will populate. Don't auto-fetch.
            autoFetchedRef.current = true;
            return;
          } else {
            // Analysis was lost — fall back to entries view (don't auto-run analysis, let user click Re-run / Deep Dive)
            setView('entries');
            return;
          }
        }

        if (needsEntries) {
          autoFetchedRef.current = true;
          // Call fetchEntries with current selectedRace stub
          fetchEntries({ raceNumber: selectedRace.raceNumber, ...selectedRace });
        } else if (needsRaceCard) {
          autoFetchedRef.current = true;
          fetchRaceCard(selectedTrack);
        } else if (needsTracks) {
          autoFetchedRef.current = true;
          fetchTracksForDay();
        }
      }, [view, apiKey, tracksForDay, raceCard, entries, selectedTrack, selectedRace, selectedDate]);

      // When track changes, refresh the set of races that have been scanned
      useEffect(() => {
        if (selectedTrack) setScannedRaces(getRacesWithPP(selectedTrack.slug, selectedDate));
      }, [selectedTrack, selectedDate]);

      // When a race is selected, load its PP data and odds if any
      useEffect(() => {
        if (selectedTrack && selectedRace) {
          const pp = loadPPData(selectedTrack.slug, selectedDate, selectedRace.raceNumber);
          setCurrentPP(pp);
          const odds = loadOddsData(selectedTrack.slug, selectedDate, selectedRace.raceNumber);
          setCurrentOdds(odds);
        } else {
          setCurrentPP(null);
          setCurrentOdds(null);
        }
      }, [selectedTrack, selectedRace, selectedDate]);

      const dateOptions = [];
      for (let i = 0; i < 8; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        dateOptions.push({
          value: formatDate(d),
          label: i === 0 ? `Today, ${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}`
                : i === 1 ? `Tomorrow, ${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}`
                : d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
        });
      }

      const fetchTracksForDay = async () => {
        if (!apiKey.trim()) { setError('Add your Anthropic API key first'); return; }
        setLoading(true); setError(null); setTracksForDay(null);
        setProgress('Finding tracks racing on this date...');
        try {
          const url = `https://entries.horseracingnation.com/entries-results/${selectedDate}`;
          const prompt = `Fetch this URL: ${url}

It lists all North American thoroughbred tracks running on ${selectedDate}. Parse the "Tracks" table. Skip harness tracks.

Return ONLY valid JSON:
{ "date": "${selectedDate}", "tracks": [{ "name": "Track Name", "slug": "track-slug-as-in-url", "firstPost": "12:40 PM", "totalRaces": 10, "avgFieldSize": 7.4, "totalPurses": "$221,000" }] }

The slug must match the URL path used in HTML links. Return valid JSON only.`;
          const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebFetch: true });
          setTracksForDay(data);
          setView('tracks');
        } catch (err) {
          setError(`Could not fetch tracks: ${err.message}`);
        } finally { setLoading(false); setProgress(''); }
      };

      const fetchRaceCard = async (track) => {
        setSelectedTrack(track);
        setLoading(true); setError(null); setRaceCard(null);
        setProgress(`Loading ${track.name} race card...`);
        try {
          const url = `https://entries.horseracingnation.com/entries-results/${track.slug}/${selectedDate}`;
          const prompt = `Fetch: ${url}
Parse the full race card. Return ONLY JSON:
{ "trackName": "${track.name}", "date": "${selectedDate}", "races": [{ "raceNumber": 1, "postTime": "12:40 PM", "distance": "6 1/2 Furlongs", "surface": "Dirt", "raceName": "Race 1 or stakes name", "conditions": "Brief conditions", "purse": "$7,500", "fieldSize": 9, "isStakes": false }] }
Return valid JSON only.`;
          const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebFetch: true });
          setRaceCard(data);
          setView('races');
        } catch (err) {
          setError(`Could not fetch race card: ${err.message}`);
        } finally { setLoading(false); setProgress(''); }
      };

      const fetchEntries = async (race) => {
        setSelectedRace(race);
        setLoading(true); setError(null); setEntries(null); setConditions(null);
        setProgress(`Loading entries for Race ${race.raceNumber}...`);
        try {
          const entriesUrl = `https://entries.horseracingnation.com/entries-results/${selectedTrack.slug}/${selectedDate}#race-${race.raceNumber}`;
          const entriesPrompt = `Fetch: ${entriesUrl}
Extract Race ${race.raceNumber} at ${selectedTrack.name} on ${selectedDate}. Return ONLY JSON:
{ "raceNumber": ${race.raceNumber}, "trackName": "${selectedTrack.name}", "distance": "${race.distance}", "surface": "${race.surface}", "conditions": "Full conditions", "purse": "${race.purse || ''}", "entries": [{ "postPosition": "1", "programNumber": "1", "horseName": "Name", "jockey": "Jockey", "trainer": "Trainer", "morningLine": "5-2", "weight": "118", "scratched": false }], "notes": "Scratches, etc." }
Return valid JSON only.`;

          const entriesPromise = callClaude({ apiKey, modelId: MODELS.haiku.id, prompt: entriesPrompt, useWebFetch: true });
          setConditionsLoading(true);
          const conditionsPromise = fetchConditionsInternal(race);

          const [entriesResult, conditionsResult] = await Promise.allSettled([entriesPromise, conditionsPromise]);
          if (entriesResult.status === 'rejected') throw entriesResult.reason;

          const entriesData = entriesResult.value.data;
          setEntries(entriesData);
          setHorses(entriesData.entries.filter(e => !e.scratched).map(e => ({
            postPosition: e.postPosition, name: e.horseName, jockey: e.jockey || '', trainer: e.trainer || '', morningLine: e.morningLine || ''
          })));
          if (conditionsResult.status === 'fulfilled') setConditions(conditionsResult.value);

          setView('entries');
        } catch (err) {
          setError(`Could not fetch entries: ${err.message}`);
        } finally { setLoading(false); setConditionsLoading(false); setProgress(''); }
      };

      const fetchConditionsInternal = async (race) => {
        const prompt = `Research live track conditions for ${selectedTrack.name} on ${selectedDate}.
Use web_search for: current track condition (Fast/Good/Sloppy/Muddy or Firm/Good/Yielding/Soft), today's weather, rail position, and how earlier races have been playing.

Return ONLY JSON:
{ "dirtCondition": null, "turfCondition": null, "weather": "67°F...", "railPosition": null, "earlyResults": "Race 1 (6F): speed held..." or "Not enough races yet", "playingNote": "Speed holding on dirt", "dataFreshness": "As of 2:45 PM ET" }
Use null for any field you can't determine. Return valid JSON only.`;
        const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebSearch: true });
        return data;
      };

      const refreshConditions = async () => {
        if (!selectedRace) return;
        setConditionsLoading(true);
        try { const data = await fetchConditionsInternal(selectedRace); setConditions(data); }
        catch (err) { console.error(err); }
        finally { setConditionsLoading(false); }
      };

      const runAnalysis = async () => {
        // v7.1: Filter out scratched horses
        const validHorses = horses.filter(h => h.name.trim() && !h.scratched);
        if (validHorses.length < 2) { setError('Need at least 2 non-scratched horses'); return; }

        setLoading(true); setError(null); setAnalysis(null);
        const model = MODELS[selectedModel];
        const steps = validHorses.map((h, i) => ({ id: `horse-${i}`, label: `Researching ${h.name}`, status: 'pending' }));
        steps.push({ id: 'synthesis', label: 'Pace projection, picks, exotics (synthesis)', status: 'pending' });
        setProgressSteps(steps);

        // v7.1: Listen for rate-limit retries so we can show status
        const retryHandler = (e) => {
          setProgress(`Rate limited — retrying in ${e.detail.wait}s (attempt ${e.detail.attempt}/3)...`);
        };
        window.addEventListener('claude-retry', retryHandler);

        try {
          const conditionsContext = conditions ? `
LIVE TRACK CONDITIONS:
- Dirt: ${conditions.dirtCondition || 'N/A'}
- Turf: ${conditions.turfCondition || 'N/A'}
- Weather: ${conditions.weather || 'N/A'}
- Rail: ${conditions.railPosition || 'Default'}
- Playing: ${conditions.playingNote || 'Insufficient data'}
- Early results: ${conditions.earlyResults || 'N/A'}
` : '';

          // Phase 1: per-horse research, with PP data injected if available
          // v7.1: Reduced concurrency (2 instead of 3) + inter-batch delay to avoid rate limits
          // v7.1: Use Haiku for research when PP data exists (cheaper, avoids rate limits), save Sonnet/Opus for synthesis
          const horseResearch = [];
          const concurrency = 2;
          for (let i = 0; i < validHorses.length; i += concurrency) {

                <div className="exotic-row"><span className="exotic-label">Exacta</span><span className="exotic-value">{analysis.exotics.exacta}</span></div>
                <div className="exotic-row"><span className="exotic-label">Trifecta</span><span className="exotic-value">{analysis.exotics.trifecta}</span></div>
                <div className="exotic-row"><span className="exotic-label">Superfecta</span><span className="exotic-value">{analysis.exotics.superfecta}</span></div>
                <p className="exotic-notes">{analysis.exotics.notes}</p>
              </section>

              <section>
                <h3>Horse-by-Horse</h3>
                {[...analysis.horses].sort((a, b) => b.confidence - a.confidence).map((horse, idx) => (
                  <div key={idx} className="horse-result">
                    <div className="horse-result-header">
                      <div className="horse-result-name"><span className="post">{horse.postPosition}.</span> {horse.name}</div>
                      <div className="horse-result-meta">
                        <span className="running-style">{horse.runningStyle}</span>
                        {horse.tripNote && <span className="trip-flag">⚑ Trip angle</span>}
                        <span className="confidence" style={{ color: confidenceColor(horse.confidence) }}>{horse.confidence}<span className="denom">/10</span></span>
                      </div>
                    </div>
                    <div className="confidence-bar"><div className="confidence-fill" style={{ width: `${(horse.confidence / 10) * 100}%` }}></div></div>
                    <div className="horse-detail-grid">
                      <div><div className="detail-label">Key Stats</div><p className="detail-text">{horse.keyStats}</p></div>
                      <div><div className="detail-label strength">Strengths</div><p className="detail-text">{horse.strengths}</p></div>
                      <div><div className="detail-label concern">Concerns</div><p className="detail-text">{horse.concerns}</p></div>
                      <div><div className="detail-label verdict">Verdict</div><p className="detail-text verdict">{horse.verdict}</p></div>
                    </div>
                    {horse.tripNote && (
                      <div className="reasoning-box" style={{ borderLeftColor: '#fcd34d' }}>
                        <div className="research-label" style={{ color: '#fcd34d' }}>Trip Note</div>
                        {horse.tripNote}
                      </div>
                    )}
                    {showReasoning && (horse.research || horse.lastRaces || horse.workouts || horse.projectedEarlyPos) && (
                      <div className="reasoning-box">
                        <div className="research-label">Research Notes</div>
                        {horse.projectedEarlyPos && <div><strong>Projected early position:</strong> {horse.projectedEarlyPos}</div>}
                        {horse.lastRaces && <div style={{ marginTop: '0.4rem' }}><strong>Last races:</strong> {horse.lastRaces}</div>}
                        {horse.workouts && <div style={{ marginTop: '0.4rem' }}><strong>Works:</strong> {horse.workouts}</div>}
                        {horse.research && <div style={{ marginTop: '0.4rem' }}>{horse.research}</div>}
                      </div>
                    )}
                  </div>
                ))}
              </section>

              <section className="summary-section">
                <div className="pace-label">Final Word</div>
                <p className="summary-quote">"{analysis.summary}"</p>
              </section>

              <div className="footer-note">AI analysis · Not financial advice · Bet responsibly</div>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW failed:', err));
      });
    }
    let deferredPrompt;
    const installPrompt = document.getElementById('installPrompt');
    const installBtn = document.getElementById('installBtn');
    const dismissBtn = document.getElementById('dismissInstall');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('install_dismissed')) installPrompt.classList.add('show');
    });
    installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installPrompt.classList.remove('show');
    });
    dismissBtn?.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('install_dismissed', '1');
    });
  </script>
</body>
</html>
