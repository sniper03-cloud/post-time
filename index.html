  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const MODELS = {
      haiku: { id: 'claude-haiku-4-5-20251001', name: 'Haiku 4.5', priceNote: '~$0.50 / race', desc: 'Fast and cheap. Low-stakes races.' },
      sonnet: { id: 'claude-sonnet-4-5', name: 'Sonnet 4.5', priceNote: '~$1.50 / race', desc: 'Recommended default. Strong analysis.' },
      opus: { id: 'claude-opus-4-7', name: 'Opus 4.7', priceNote: '~$3-5 / race', desc: 'Deepest research. For stakes and big bets.' }
    };

    // Storage helpers — PP data (persists indefinitely)
    const ppStorageKey = (trackSlug, date, raceNum) => `pp:${trackSlug}:${date}:race${raceNum}`;
    const savePPData = (trackSlug, date, raceNum, data) => {
      try { localStorage.setItem(ppStorageKey(trackSlug, date, raceNum), JSON.stringify(data)); return true; }
      catch (e) { console.error('Storage failed:', e); return false; }
    };
    const loadPPData = (trackSlug, date, raceNum) => {
      try { const s = localStorage.getItem(ppStorageKey(trackSlug, date, raceNum)); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };
    const getRacesWithPP = (trackSlug, date) => {
      const races = new Map();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`pp:${trackSlug}:${date}:race`)) {
          const m = key.match(/race(\d+)$/);
          if (m) {
            try {
              const data = JSON.parse(localStorage.getItem(key));
              races.set(parseInt(m[1]), data.source || 'photo');
            } catch (e) { races.set(parseInt(m[1]), 'photo'); }
          }
        }
      }
      return races;
    };

    // Storage helpers — Tote odds data (ephemeral, timestamped)
    const oddsStorageKey = (trackSlug, date, raceNum) => `odds:${trackSlug}:${date}:race${raceNum}`;
    const saveOddsData = (trackSlug, date, raceNum, data) => {
      try { localStorage.setItem(oddsStorageKey(trackSlug, date, raceNum), JSON.stringify(data)); return true; }
      catch (e) { console.error('Odds storage failed:', e); return false; }
    };
    const loadOddsData = (trackSlug, date, raceNum) => {
      try { const s = localStorage.getItem(oddsStorageKey(trackSlug, date, raceNum)); return s ? JSON.parse(s) : null; }
      catch (e) { return null; }
    };
    const deleteOddsData = (trackSlug, date, raceNum) => {
      try { localStorage.removeItem(oddsStorageKey(trackSlug, date, raceNum)); return true; }
      catch (e) { return false; }
    };

    // Odds parsing — accept "5-2", "5/2", "2.5", "12-1", "8/5"
    const parseOdds = (input) => {
      if (!input) return null;
      const s = String(input).trim();
      if (!s) return null;
      // Decimal format: "2.5" or "2.50"
      if (/^\d+(\.\d+)?$/.test(s)) {
        const n = parseFloat(s);
        return isNaN(n) ? null : n;
      }
      // Fractional: "5-2", "5/2", "8/5", "12-1"
      const m = s.match(/^(\d+(?:\.\d+)?)[\/\-](\d+(?:\.\d+)?)$/);
      if (m) {
        const num = parseFloat(m[1]);
        const den = parseFloat(m[2]);
        if (isNaN(num) || isNaN(den) || den === 0) return null;
        return num / den;
      }
      return null;
    };

    // Overlay math
    const computeImpliedFromOdds = (decimalOdds) => {
      // Fractional odds to implied probability. 5-1 (decimal 5.0) → 1/6 = 0.167
      if (decimalOdds == null || decimalOdds <= 0) return null;
      return 1 / (decimalOdds + 1);
    };

    const normalizeProbabilities = (probs) => {
      // Normalize an array of probabilities so they sum to 1.0 (removes takeout from tote, removes calibration drift from AI)
      const sum = probs.reduce((a, b) => a + (b || 0), 0);
      if (sum === 0) return probs.map(() => 0);
      return probs.map(p => (p || 0) / sum);
    };

    const classifyOverlay = (aiProb, toteProb) => {
      if (!aiProb || !toteProb) return null;
      const ratio = aiProb / toteProb;
      if (ratio >= 2.0) return { tier: 'big', ratio, color: '#fda4af', label: 'BIG overlay' };
      if (ratio >= 1.5) return { tier: 'meaningful', ratio, color: '#fcd34d', label: 'Meaningful overlay' };
      if (ratio >= 1.25) return { tier: 'small', ratio, color: '#fde68a', label: 'Small overlay' };
      if (ratio <= 0.67) return { tier: 'big-under', ratio, color: '#57534e', label: 'Big underlay' };
      if (ratio <= 0.80) return { tier: 'under', ratio, color: '#57534e', label: 'Underlay' };
      return { tier: 'fair', ratio, color: '#78716c', label: 'Fair price' };
    };

    // Kelly sizing — fractional Kelly to avoid the aggressiveness of full Kelly
    // edge = aiProb - toteProb (in normalized probability space)
    // For bet sizing we use raw decimal odds and AI's subjective probability
    const computeKelly = (aiProb, decimalOdds, bankroll, fraction = 0.25) => {
      if (!aiProb || !decimalOdds || !bankroll) return 0;
      // Full Kelly formula for fixed-odds: f* = (p*(b+1) - 1) / b, where b = decimalOdds
      const b = decimalOdds;
      const p = aiProb;
      const fullKelly = (p * (b + 1) - 1) / b;
      if (fullKelly <= 0) return 0;
      return Math.max(0, bankroll * fullKelly * fraction);
    };

    // ================================================================
    // Brisnet Single File Parser

      trnStatCat5Label: 1357,
      trnStatCat6Label: 1362,

      // J/T Combo meet stats (1413-1417)
      tjComboMeetStarts: 1413, tjComboMeetWins: 1414,
      tjComboMeetPlaces: 1415, tjComboMeetShows: 1416, tjComboMeetROI: 1417
    };

    // CSV parser that handles quoted strings with commas
    const parseCSVLine = (line) => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result.map(s => s.trim());
    };

    // Get field value (1-indexed). Returns null if empty.
    const getField = (row, fieldNum) => {
      if (fieldNum - 1 >= row.length) return null;
      const v = row[fieldNum - 1];
      if (v === undefined || v === null || v === '') return null;
      return v;
    };

    // Get numeric field, return null if not a valid number
    const getNumField = (row, fieldNum) => {
      const v = getField(row, fieldNum);
      if (v === null) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    };

    // Convert yards to human-readable distance. Handles US standard distances.
    const yardsToDistance = (yards) => {
      if (!yards) return null;
      const abs = Math.abs(yards);
      // Standard US route distances (within 10yd tolerance for BrisNet rounding)
      const standards = [
        { yards: 1320, name: '6 Furlongs' },
        { yards: 1430, name: '6 1/2 Furlongs' },
        { yards: 1540, name: '7 Furlongs' },
        { yards: 1650, name: '7 1/2 Furlongs' },
        { yards: 1760, name: '1 mile' },
        { yards: 1870, name: '1 1/16 miles' },
        { yards: 1980, name: '1 1/8 miles' },
        { yards: 2090, name: '1 3/16 miles' },
        { yards: 2200, name: '1 1/4 miles' },
        { yards: 2310, name: '1 5/16 miles' },
        { yards: 2420, name: '1 3/8 miles' },
        { yards: 2640, name: '1 1/2 miles' },
        { yards: 2860, name: '1 5/8 miles' },
        { yards: 3080, name: '1 3/4 miles' },
        { yards: 3300, name: '1 7/8 miles' },
        { yards: 3520, name: '2 miles' },
        { yards: 880, name: '4 Furlongs' },
        { yards: 990, name: '4 1/2 Furlongs' },
        { yards: 1100, name: '5 Furlongs' },
        { yards: 1210, name: '5 1/2 Furlongs' }
      ];
      for (const s of standards) {
        if (Math.abs(abs - s.yards) <= 10) return s.name;
      }
      // Fallback: compute in furlongs
      const furlongs = abs / 220;
      if (furlongs >= 8) return `${(abs / 1760).toFixed(2)} miles`;
      if (furlongs === Math.floor(furlongs)) return `${furlongs} Furlongs`;
      return `${furlongs.toFixed(1)} Furlongs`;
    };

    const surfaceCodeToName = (code) => {
      const map = { 'D': 'Dirt', 'd': 'Inner Dirt', 'T': 'Turf', 't': 'Inner Turf', 's': 'Steeplechase', 'h': 'Hunt', 'A': 'All Weather' };
      return map[code] || code || 'Unknown';
    };

    const raceTypeToName = (code) => {
      const map = {
        'G1': 'Grade I Stakes', 'G2': 'Grade II Stakes', 'G3': 'Grade III Stakes',
        'N': 'Non-graded Stakes', 'A': 'Allowance', 'R': 'Starter Allowance',
        'T': 'Starter Handicap', 'C': 'Claiming', 'CO': 'Optional Claiming',
        'S': 'Maiden Special Weight', 'M': 'Maiden Claiming',
        'AO': 'Allowance Optional Claiming', 'MO': 'Maiden Optional Claiming',
        'NO': 'Optional Claiming Stakes'
      };
      return map[code] || code || 'Unknown';
    };

    // Parse a single horse row into our app's PP data schema
    const parseBrisnetRow = (row) => {
      const yob = getNumField(row, BRIS_FIELD.yearOfBirth);
      let age = null;
      if (yob !== null) {
        const fullYear = yob < 50 ? 2000 + yob : 1900 + yob;
        age = new Date().getFullYear() - fullYear;
      }

      const medCode = getNumField(row, BRIS_FIELD.medication);
      const medMap = { 0: null, 1: 'L', 2: 'B', 3: 'L/B', 4: 'L1', 5: 'L1/B', 9: null };
      const medication = medCode !== null ? medMap[medCode] : null;

      const eqCode = getNumField(row, BRIS_FIELD.equipmentChange);
      const eqMap = { 0: null, 1: 'Blinkers on', 2: 'Blinkers off', 9: null };
      const equipmentChange = eqCode !== null ? eqMap[eqCode] : null;

      const horse = {
        // Identity
        postPosition: getField(row, BRIS_FIELD.postPosition),
        programNumber: getField(row, BRIS_FIELD.programNumber),
        programPostPosition: getField(row, BRIS_FIELD.programPostPosition),
        horseName: getField(row, BRIS_FIELD.horseName),
        age,
        sex: getField(row, BRIS_FIELD.sex),
        color: getField(row, BRIS_FIELD.horseColor),
        weight: getNumField(row, BRIS_FIELD.weight),
        morningLine: getNumField(row, BRIS_FIELD.morningLineOdds),
        medication,
        equipmentChange,
        entry: getField(row, BRIS_FIELD.entry),
        scratched: getField(row, BRIS_FIELD.entry) === 'S',

        // Pedigree
        sire: getField(row, BRIS_FIELD.sire),
        sireSire: getField(row, BRIS_FIELD.sireSire),
        dam: getField(row, BRIS_FIELD.dam),
        damSire: getField(row, BRIS_FIELD.damSire),
        breeder: getField(row, BRIS_FIELD.breeder),
        stateBred: getField(row, BRIS_FIELD.stateBred),
        auctionPrice: getField(row, BRIS_FIELD.auctionPrice),
        auctionInfo: getField(row, BRIS_FIELD.auctionInfo),
        sireStudFee: getField(row, BRIS_FIELD.sireStudFee),

        // Connections today
        jockey: getField(row, BRIS_FIELD.currentJockey),
        trainer: getField(row, BRIS_FIELD.currentTrainer),
        owner: getField(row, BRIS_FIELD.owner),
        apprenticeAllowance: getNumField(row, BRIS_FIELD.apprenticeAllowance),

        // KEY PACE FIELDS — critical for analysis
        brisRunStyle: getField(row, BRIS_FIELD.brisRunStyle),           // E / EP / P / S
        quirinSpeedPoints: getNumField(row, BRIS_FIELD.quirinSpeedPoints), // 0-8

        // KEY COMPOSITE NUMBER
        brisPrimePower: getNumField(row, BRIS_FIELD.brisPrimePower),

        // BRIS Pace Pars for class
        paceParClass: {
          pace2f: getNumField(row, BRIS_FIELD.brisPacePar2f),
          pace4f: getNumField(row, BRIS_FIELD.brisPacePar4f),
          pace6f: getNumField(row, BRIS_FIELD.brisPacePar6f),
          speed: getNumField(row, BRIS_FIELD.brisSpeedParClass),
          latePace: getNumField(row, BRIS_FIELD.brisLatePacePar)
        },

        daysSinceLastRace: getNumField(row, BRIS_FIELD.daysSinceLastRace),

        // Pedigree ratings
        pedigreeRatings: {
          dirt: getField(row, BRIS_FIELD.brisDirtPedigree),
          mud: getField(row, BRIS_FIELD.brisMudPedigree),
          turf: getField(row, BRIS_FIELD.brisTurfPedigree),
          distance: getField(row, BRIS_FIELD.brisDistPedigree)
        },

        // Records
        lifetimeRecord: {
          starts: getNumField(row, BRIS_FIELD.lifetimeStarts),
          wins: getNumField(row, BRIS_FIELD.lifetimeWins),
          places: getNumField(row, BRIS_FIELD.lifetimePlaces),
          shows: getNumField(row, BRIS_FIELD.lifetimeShows),
          earnings: getField(row, BRIS_FIELD.lifetimeEarnings),
          topBeyer: getNumField(row, BRIS_FIELD.bestBrisSpeedLife)
        },
        currentYearRecord: {
          year: getNumField(row, BRIS_FIELD.currentYear),
          starts: getNumField(row, BRIS_FIELD.currentYearStarts),
          wins: getNumField(row, BRIS_FIELD.currentYearWins),
          places: getNumField(row, BRIS_FIELD.currentYearPlaces),
          shows: getNumField(row, BRIS_FIELD.currentYearShows),
          earnings: getField(row, BRIS_FIELD.currentYearEarnings)
        },
        previousYearRecord: {
          year: getNumField(row, BRIS_FIELD.previousYear),
          starts: getNumField(row, BRIS_FIELD.previousYearStarts),
          wins: getNumField(row, BRIS_FIELD.previousYearWins),
          places: getNumField(row, BRIS_FIELD.previousYearPlaces),
          shows: getNumField(row, BRIS_FIELD.previousYearShows),
          earnings: getField(row, BRIS_FIELD.previousYearEarnings)
        },
        trackRecord: {
          starts: getNumField(row, BRIS_FIELD.trackStarts),
          wins: getNumField(row, BRIS_FIELD.trackWins),
          places: getNumField(row, BRIS_FIELD.trackPlaces),
          shows: getNumField(row, BRIS_FIELD.trackShows),
          earnings: getField(row, BRIS_FIELD.trackEarnings)
        },
        distanceRecord: {
          starts: getNumField(row, BRIS_FIELD.distanceStarts),
          wins: getNumField(row, BRIS_FIELD.distanceWins),
          places: getNumField(row, BRIS_FIELD.distancePlaces),
          shows: getNumField(row, BRIS_FIELD.distanceShows),
          earnings: getField(row, BRIS_FIELD.distanceEarnings)
        },
        turfRecord: {
          starts: getNumField(row, BRIS_FIELD.turfStarts),
          wins: getNumField(row, BRIS_FIELD.turfWins),
          places: getNumField(row, BRIS_FIELD.turfPlaces),
          shows: getNumField(row, BRIS_FIELD.turfShows),
          earnings: getField(row, BRIS_FIELD.turfEarnings)
        },
        wetRecord: {
          starts: getNumField(row, BRIS_FIELD.wetStarts),
          wins: getNumField(row, BRIS_FIELD.wetWins),
          places: getNumField(row, BRIS_FIELD.wetPlaces),
          shows: getNumField(row, BRIS_FIELD.wetShows),
          earnings: getField(row, BRIS_FIELD.wetEarnings)
        },
        fastDirtRecord: {
          starts: getNumField(row, BRIS_FIELD.fastDirtStarts),
          wins: getNumField(row, BRIS_FIELD.fastDirtWins),
          places: getNumField(row, BRIS_FIELD.fastDirtPlaces),
          shows: getNumField(row, BRIS_FIELD.fastDirtShows),
          earnings: getField(row, BRIS_FIELD.fastDirtEarnings)
        },
        brisSpeedFigures: {
          bestLife: getNumField(row, BRIS_FIELD.bestBrisSpeedLife),
          bestYear: getNumField(row, BRIS_FIELD.bestBrisSpeedYear),
          best2ndYear: getNumField(row, BRIS_FIELD.bestBrisSpeed2ndYear),
          bestThisTrack: getNumField(row, BRIS_FIELD.bestBrisSpeedThisTrack),
          bestFast: getNumField(row, BRIS_FIELD.bestBrisSpeedFast),
          bestTurf: getNumField(row, BRIS_FIELD.bestBrisSpeedTurf),
          bestOff: getNumField(row, BRIS_FIELD.bestBrisSpeedOff),
          bestDistance: getNumField(row, BRIS_FIELD.bestBrisSpeedDist)
        },
        trainerStats: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.trainerStartsMeet),
            wins: getNumField(row, BRIS_FIELD.trainerWinsMeet),
            places: getNumField(row, BRIS_FIELD.trainerPlacesMeet),
            shows: getNumField(row, BRIS_FIELD.trainerShowsMeet)
          },
          currentYear: {
            starts: getNumField(row, BRIS_FIELD.trainerStartsYear),
            wins: getNumField(row, BRIS_FIELD.trainerWinsYear),
            places: getNumField(row, BRIS_FIELD.trainerPlacesYear),
            shows: getNumField(row, BRIS_FIELD.trainerShowsYear),
            roi: getNumField(row, BRIS_FIELD.trainerROIYear)
          }
        },
        // KEY Trainer Angle Categories (label + W%/ITM/ROI)
        trainerAngles: [1, 2, 3, 4, 5, 6].map(n => {
          const labelField = BRIS_FIELD['trnStatCat' + n + 'Label'] || (BRIS_FIELD.trnStatCat1Label + (n - 1) * 5);
          return {
            label: getField(row, labelField),
            starts: getNumField(row, labelField + 1),
            winPct: getNumField(row, labelField + 2),
            itmPct: getNumField(row, labelField + 3),
            roi: getNumField(row, labelField + 4)
          };
        }).filter(a => a.label),
        jockeyStats: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.jockeyStartsMeet),
            wins: getNumField(row, BRIS_FIELD.jockeyWinsMeet),
            places: getNumField(row, BRIS_FIELD.jockeyPlacesMeet),
            shows: getNumField(row, BRIS_FIELD.jockeyShowsMeet)
          }
        },
        jockeyTrainerCombo: {
          meet: {
            starts: getNumField(row, BRIS_FIELD.tjComboMeetStarts),
            wins: getNumField(row, BRIS_FIELD.tjComboMeetWins),
            places: getNumField(row, BRIS_FIELD.tjComboMeetPlaces),
            shows: getNumField(row, BRIS_FIELD.tjComboMeetShows),
            roi: getNumField(row, BRIS_FIELD.tjComboMeetROI)
          },
          last365: {
            starts: getNumField(row, BRIS_FIELD.tjCombo365Starts),
            wins: getNumField(row, BRIS_FIELD.tjCombo365Wins),
            places: getNumField(row, BRIS_FIELD.tjCombo365Places),
            shows: getNumField(row, BRIS_FIELD.tjCombo365Shows),
            roi: getNumField(row, BRIS_FIELD.tjCombo365ROI)
          }
        }
      };

      // Parse past performances (10 back, most recent first)
      horse.pastPerformances = [];
      for (let i = 0; i < 10; i++) {
        const date = getField(row, BRIS_FIELD.ppDate + i);
        if (!date) continue;
        const distYards = getNumField(row, BRIS_FIELD.ppDistanceYards + i);
        const pp = {
          date: date,
          daysSincePrev: getNumField(row, BRIS_FIELD.ppDaysSincePrev + i),
          trackCode: getField(row, BRIS_FIELD.ppTrackCode + i),
          track: getField(row, BRIS_FIELD.ppBrisTrackCode + i),
          raceNum: getNumField(row, BRIS_FIELD.ppRaceNum + i),
          condition: getField(row, BRIS_FIELD.ppTrackCondition + i),
          distanceYards: distYards,
          distance: yardsToDistance(distYards),
          surface: surfaceCodeToName(getField(row, BRIS_FIELD.ppSurface + i)),
          specialChute: getField(row, BRIS_FIELD.ppSpecialChute + i) === 'c',
          numEntrants: getNumField(row, BRIS_FIELD.ppNumEntrants + i),
          postPosition: getNumField(row, BRIS_FIELD.ppPostPosition + i),
          equipment: getField(row, BRIS_FIELD.ppEquipment + i),
          raceName: getField(row, BRIS_FIELD.ppRaceName + i),
          raceType: raceTypeToName(getField(row, BRIS_FIELD.ppRaceType + i)),
          raceClassification: getField(row, BRIS_FIELD.ppRaceClassification + i),
          beyerFig: getNumField(row, BRIS_FIELD.ppBrisSpeedRating + i), // BRIS Speed = equivalent of Beyer
          oldSpeedRating: getNumField(row, BRIS_FIELD.ppSpeedRating + i),
          trackVariant: getNumField(row, BRIS_FIELD.ppTrackVariant + i),
          tripComment: getField(row, BRIS_FIELD.ppTripComment + i),
          altComment: getField(row, BRIS_FIELD.ppAlternateComment + i),
          // Placings
          winner: getField(row, BRIS_FIELD.ppWinnerName + i),
          winnerWeight: getNumField(row, BRIS_FIELD.ppWinnerWeight + i),
          winnerMargin: getNumField(row, BRIS_FIELD.ppWinnerMargin + i),
          secondPlace: getField(row, BRIS_FIELD.pp2ndPlaceName + i),
          secondPlaceWeight: getNumField(row, BRIS_FIELD.pp2ndPlaceWeight + i),
          thirdPlace: getField(row, BRIS_FIELD.pp3rdPlaceName + i),
          thirdPlaceWeight: getNumField(row, BRIS_FIELD.pp3rdPlaceWeight + i),
          // Horse's performance
          finishPosition: getField(row, BRIS_FIELD.ppFinishPos + i),
          moneyPosition: getField(row, BRIS_FIELD.ppMoneyPos + i),
          beatenLengths: (() => {
            const v = getNumField(row, BRIS_FIELD.ppFinishBtnLngthsOnly + i);
            if (v !== null) return v;
            // If the horse won (finish = 1), beaten lengths = 0 even if the field is blank
            const finish = getField(row, BRIS_FIELD.ppFinishPos + i);
            if (finish === '1') return 0;
            return null;
          })(),
          odds: getNumField(row, BRIS_FIELD.ppOdds + i),
          weight: getNumField(row, BRIS_FIELD.ppWeight + i),
          purse: getNumField(row, BRIS_FIELD.ppRacePurse + i),
          finalTime: getNumField(row, BRIS_FIELD.ppFinalTime + i),
          jockey: getField(row, BRIS_FIELD.ppJockey + i),
          trainer: getField(row, BRIS_FIELD.ppTrainer + i),
          apprenticeAllowance: getNumField(row, BRIS_FIELD.ppApprentice + i),
          favorite: getNumField(row, BRIS_FIELD.ppFavorite + i) === 1,
          fractions: [
            getNumField(row, BRIS_FIELD.ppFraction1 + i),
            getNumField(row, BRIS_FIELD.ppFraction2 + i),
            getNumField(row, BRIS_FIELD.ppFraction3 + i)
          ].filter(v => v !== null),
          brisPace: {
            pace2f: getNumField(row, BRIS_FIELD.ppBrisPace2f + i),
            pace4f: getNumField(row, BRIS_FIELD.ppBrisPace4f + i),
            pace6f: getNumField(row, BRIS_FIELD.ppBrisPace6f + i),
            pace8f: getNumField(row, BRIS_FIELD.ppBrisPace8f + i),
            pace10f: getNumField(row, BRIS_FIELD.ppBrisPace10f + i),
            latePace: getNumField(row, BRIS_FIELD.ppBrisLatePace + i),
            raceShape1: getNumField(row, BRIS_FIELD.ppBrisRaceShape1 + i),
            raceShape2: getNumField(row, BRIS_FIELD.ppBrisRaceShape2 + i)
          },
          callPositions: {
            start: getField(row, BRIS_FIELD.ppStartCallPos + i),
            first: getField(row, BRIS_FIELD.pp1stCallPos + i),
            second: getField(row, BRIS_FIELD.pp2ndCallPos + i),
            gate: getField(row, BRIS_FIELD.ppGateCallPos + i),
            stretch: getField(row, BRIS_FIELD.ppStretchCallPos + i)
          },
          beatenLengthsAtCall: {
            start: getNumField(row, BRIS_FIELD.ppStartBtnLngthsOnly + i),
            first: getNumField(row, BRIS_FIELD.pp1stBtnLngthsOnly + i),
            second: getNumField(row, BRIS_FIELD.pp2ndBtnLngthsOnly + i),
            stretch: getNumField(row, BRIS_FIELD.ppStretchBtnLngthsOnly + i)
          }
        };

        // Build running line in DRF-ish format
        const cp = pp.callPositions;
        const bl = pp.beatenLengthsAtCall;
        const seg = (pos, btn) => pos ? (btn != null && btn !== 0 ? `${pos}-${btn}` : pos) : null;
        const parts = [];
        const s1 = seg(cp.start, bl.start); if (s1) parts.push(s1);
        const s2 = seg(cp.first, bl.first); if (s2) parts.push(s2);
        const s3 = seg(cp.second, bl.second); if (s3) parts.push(s3);
        const s4 = seg(cp.stretch, bl.stretch); if (s4) parts.push(s4);
        if (pp.finishPosition) {
          parts.push(`${pp.finishPosition}${pp.beatenLengths != null && pp.beatenLengths !== 0 ? `-${pp.beatenLengths}` : ''}`);
        }
        pp.runningLine = parts.join(' ');

        // Build compact top-finishers string
        const topFinishers = [];
        if (pp.winner) topFinishers.push(`${pp.winner}${pp.winnerWeight ? ` ${pp.winnerWeight}` : ''}`);
        if (pp.secondPlace) topFinishers.push(`${pp.secondPlace}${pp.secondPlaceWeight ? ` ${pp.secondPlaceWeight}` : ''}-${pp.winnerMargin || ''}`);
        if (pp.thirdPlace) topFinishers.push(`${pp.thirdPlace}${pp.thirdPlaceWeight ? ` ${pp.thirdPlaceWeight}` : ''}`);
        pp.topFinishers = topFinishers.join(' ');

        horse.pastPerformances.push(pp);
      }

      // Parse workouts (12 back)
      horse.workouts = [];
      for (let i = 0; i < 12; i++) {
        const wDate = getField(row, BRIS_FIELD.workoutDate + i);
        if (!wDate) continue;
        const wTime = getNumField(row, BRIS_FIELD.workoutTime + i);
        const wDist = getNumField(row, BRIS_FIELD.workoutDistance + i);
        horse.workouts.push({
          date: wDate,
          time: wTime,
          bullet: wTime !== null && wTime < 0, // negative time = bullet work
          track: getField(row, BRIS_FIELD.workoutTrack + i),
          distanceYards: wDist,
          distance: yardsToDistance(wDist),
          condition: getField(row, BRIS_FIELD.workoutCondition + i),
          description: getField(row, BRIS_FIELD.workoutDescription + i),
          trackType: getField(row, BRIS_FIELD.workoutTrackType + i),
          numWorks: getNumField(row, BRIS_FIELD.workoutNumWorks + i),
          rank: getField(row, BRIS_FIELD.workoutRank + i)
        });
      }

      return horse;
    };

    // Parse whole Brisnet file into { byRace: { raceNum: { trackName, horses: [...] } } }
    const parseBrisnetFile = (text, trackSlug, expectedDate) => {
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      const byRace = {};
      let trackCode = null;
      let parseErrors = [];

      for (const line of lines) {
        try {
          const row = parseCSVLine(line);
          const rowTrack = getField(row, BRIS_FIELD.track);
          const rowRace = getNumField(row, BRIS_FIELD.raceNum);
          const rowDate = getField(row, BRIS_FIELD.date);
          if (!rowRace) continue;

          if (!trackCode) trackCode = rowTrack;

          if (!byRace[rowRace]) {
            byRace[rowRace] = {
              raceNumber: rowRace,
              trackCode: rowTrack,
              date: rowDate,
              distance: yardsToDistance(getNumField(row, BRIS_FIELD.distanceYards)),
              distanceYards: getNumField(row, BRIS_FIELD.distanceYards),
              surface: surfaceCodeToName(getField(row, BRIS_FIELD.surface)),
              raceType: raceTypeToName(getField(row, BRIS_FIELD.raceType)),
              classification: getField(row, BRIS_FIELD.classification),
              purse: getNumField(row, BRIS_FIELD.purse),
              claimingPrice: getNumField(row, BRIS_FIELD.claimingPrice),
              conditions: getField(row, BRIS_FIELD.raceConditions),
              trackRecord: getNumField(row, BRIS_FIELD.trackRecord),
              horses: []
            };
          }

          const horse = parseBrisnetRow(row);
          byRace[rowRace].horses.push(horse);
        } catch (e) {
          parseErrors.push(`Line: ${line.substring(0, 50)}... — ${e.message}`);
        }
      }

      return { byRace, trackCode, parseErrors };
    };

    // Icons
    const Icon = ({ children }) => (<svg className="icon" viewBox="0 0 24 24">{children}</svg>);
    const IconFlower = () => <Icon><path d="M12 7.5a4.5 4.5 0 1 1 4.5 4.5M12 7.5A4.5 4.5 0 1 0 7.5 12M12 7.5V9m-4.5 3a4.5 4.5 0 1 0 4.5 4.5M7.5 12H9m7.5 0a4.5 4.5 0 1 1-4.5 4.5m4.5-4.5H15m-3 4.5V15m0 0a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" /></Icon>;
    const IconSparkle = () => <Icon><path d="M12 3l1.9 5.8L19.5 10l-5.6 1.9L12 17l-1.9-5.1L4.5 10l5.6-1.2L12 3z" /></Icon>;
    const IconPlus = () => <Icon><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
    const IconX = () => <Icon><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;

    const formatDate = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };

    // Read file to base64
    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const callClaude = async ({ apiKey, modelId, prompt, imageData, useWebFetch = false, useWebSearch = false, maxTokens = 8000 }) => {
      const tools = [];
      const headers = {
        "Content-Type": "application/json",
        "x-api-key": apiKey.trim(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      };
      if (useWebFetch) { tools.push({ type: "web_fetch_20250910", name: "web_fetch", max_uses: 3 }); headers["anthropic-beta"] = "web-fetch-2025-09-10"; }
      if (useWebSearch) tools.push({ type: "web_search_20250305", name: "web_search" });

      // Build content - if images provided, use content array format
      let content;
      if (imageData && imageData.length > 0) {
        content = [
          ...imageData.map(img => ({
            type: "image",
            source: { type: "base64", media_type: img.mediaType, data: img.data }
          })),
          { type: "text", text: prompt }
        ];
      } else {
        content = prompt;
      }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: modelId,
          max_tokens: maxTokens,
          messages: [{ role: "user", content }],
          tools: tools.length > 0 ? tools : undefined
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText.slice(0, 400)}`);
      }

      const data = await response.json();
      const textBlocks = data.content.filter(item => item.type === "text").map(item => item.text).join("\n");
      let cleaned = textBlocks.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      const firstBrace = cleaned.indexOf('{');
      const lastBrace = cleaned.lastIndexOf('}');
      if (firstBrace !== -1 && lastBrace !== -1) cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      try { return { data: JSON.parse(cleaned), usage: data.usage }; }
      catch (e) { console.error('Parse fail:', textBlocks); throw new Error(`Invalid JSON: ${textBlocks.slice(0, 200)}`); }
    };

    // SCAN MODAL — two-section design:

      // Run PP photo extraction (vision)

          const prompt = `You are a professional horse racing data extractor. The attached image(s) show past performance (PP) data from a DRF or Brisnet program for a specific race.

RACE CONTEXT:

}

Preserve trip comments verbatim. Return valid JSON only.`;
          const { data } = await callClaude({ apiKey, modelId: MODELS.sonnet.id, prompt, imageData, maxTokens: 16000 });

      const runBrisnetImport = async () => {

        try {

          let savedCount = 0;

          for (const raceNum of racesToSave) {

      // Run odds screenshot extraction (vision)
      const runOddsExtraction = async () => {

          const prompt = `You are a professional horse racing tote-board reader. The attached image(s) show LIVE TOTE/BETTING data — odds, pool percentages, odds movement — from TwinSpires, NYRA Bets, the track's tote board, or a similar source.

                <div className="section-body">

                      <strong>✓ Already loaded</strong> — {existingPP.horses?.length || 0} horses ({existingPP.source === 'brisnet' ? '📊 Brisnet' : '📷 Photo scan'}).

                    </button>
                    <button className={`mode-btn ${ppMode === 'brisnet' ? 'active' : ''}`} onClick={() => { setPpMode('brisnet'); setError(null); }} disabled={processing}>

                          <IconScan /> Import {importScope === 'all' && brisnetPreview ? `${brisnetPreview.raceCount} Races` : `Race ${race.raceNumber}`}
                        </button>
                      )}
                      <p style={{ fontSize: '0.75rem', color: '#57534e', marginTop: '1rem', textAlign: 'center', fontStyle: 'italic' }}>
                        Parsed locally · No API cost
                      </p>
                    </>
                  )}
                </div>
              )}
            </div>

            {/* Section 2: Live Tote Odds */}
            <div className={`data-section ${expandedSection === 'odds' ? 'expanded' : 'collapsed'}`}>
              <button
                className="section-header"
                onClick={() => !processing && setExpandedSection(expandedSection === 'odds' ? null : 'odds')}
                disabled={processing}
              >
                <div className="section-title">
                  <span className="section-num">2</span>
                  <div>
                    <div className="section-name">Live Tote Odds <span style={{ color: '#78716c', fontWeight: 'normal', fontSize: '0.75rem' }}>(optional)</span></div>
                    <div className="section-sub">
                      {existingOdds
                        ? `✓ ${existingOdds.horses?.length || 0} horses, captured ${oddsAge}`
                        : 'TwinSpires screenshot — enables overlay detection'}
                    </div>
                  </div>
                </div>
                <span className="section-chevron">{expandedSection === 'odds' ? '−' : '+'}</span>
              </button>

              {expandedSection === 'odds' && (
                <div className="section-body">
                  {existingOdds && (
                    <div className="scanned-summary" style={{ background: 'rgba(252, 211, 77, 0.08)', borderColor: 'rgba(252, 211, 77, 0.3)' }}>
                      <strong style={{ color: '#fcd34d' }}>✓ Odds captured {oddsAge}</strong> from {existingOdds.source}. Odds change up to post time — re-snap closer to post for best accuracy.
                      {' '}<button style={{ background: 'none', border: 'none', color: '#fb7185', textDecoration: 'underline', cursor: 'pointer', font: 'inherit' }} onClick={clearExistingOdds}>delete</button>
                    </div>
                  )}

                  <p style={{ fontSize: '0.875rem', color: '#a8a29e', marginBottom: '1rem', fontStyle: 'italic' }}>
                    Screenshot the TwinSpires <strong>Advanced</strong> tab (or any tote display) showing live odds for this race. The app will extract odds and flag overlays in the analysis.
                  </p>

                  <label
                    className={`upload-zone ${oddsDragging ? 'dragging' : ''}`}
                    style={{ borderColor: oddsDragging ? '#fcd34d' : undefined }}
                    onClick={() => oddsFileInputRef.current?.click()}
                    onDragOver={(e) => { e.preventDefault(); setOddsDragging(true); }}
                    onDragLeave={() => setOddsDragging(false)}
                    onDrop={(e) => { e.preventDefault(); setOddsDragging(false); handleOddsFiles(e.dataTransfer.files); }}
                  >
                    <IconCamera />
                    <div style={{ marginTop: '0.5rem', fontFamily: 'Playfair Display, serif', fontSize: '1rem' }}>Tap to add tote screenshot</div>
                    <div style={{ marginTop: '0.25rem', fontSize: '0.8rem', color: '#78716c' }}>{oddsImages.length} added</div>
                    <input ref={oddsFileInputRef} type="file" accept="image/*" multiple onChange={(e) => handleOddsFiles(e.target.files)} disabled={processing} />
                  </label>

                  {oddsPreviews.length > 0 && (
                    <div className="image-preview-grid">
                      {oddsPreviews.map((src, idx) => (
                        <div key={idx} className="image-preview">
                          <img src={src} alt={`Odds ${idx + 1}`} />
                          <div className="img-num">{idx + 1}</div>
                          {!processing && <button className="remove-img" onClick={() => removeOddsImage(idx)}><IconX /></button>}
                        </div>
                      ))}
                    </div>
                  )}

                  {!processing && (
                    <button className="primary-btn" style={{ background: 'linear-gradient(90deg, #fcd34d, #fbbf24, #fcd34d)', marginTop: '0.5rem' }} onClick={runOddsExtraction} disabled={oddsImages.length === 0}>
                      <IconScan /> Extract Odds ({oddsImages.length} image{oddsImages.length !== 1 ? 's' : ''})
                    </button>
                  )}

                  <p style={{ fontSize: '0.75rem', color: '#57534e', marginTop: '1rem', textAlign: 'center', fontStyle: 'italic' }}>
                    Sonnet 4.5 vision · ~$0.05 per screenshot · Tote text is big, OCR very reliable
                  </p>
                </div>
              )}
            </div>

            {processing && (
              <div style={{ textAlign: 'center', padding: '1rem 0', color: '#6ee7b7', fontStyle: 'italic', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.75rem' }}>
                <div className="spinner-mint"></div> {status}
              </div>
            )}

            {error && <div className="error-box"><IconAlert /><div>{error}</div></div>}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('home');
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('postTime_apiKey') || '');
      const [selectedDate, setSelectedDate] = useState(() => formatDate(new Date()));
      const [selectedModel, setSelectedModel] = useState(() => localStorage.getItem('postTime_model') || 'sonnet');

      const [tracksForDay, setTracksForDay] = useState(null);
      const [selectedTrack, setSelectedTrack] = useState(null);
      const [raceCard, setRaceCard] = useState(null);
      const [selectedRace, setSelectedRace] = useState(null);
      const [entries, setEntries] = useState(null);
      const [horses, setHorses] = useState([]);
      const [conditions, setConditions] = useState(null);
      const [conditionsLoading, setConditionsLoading] = useState(false);
      const [analysis, setAnalysis] = useState(null);
      const [showReasoning, setShowReasoning] = useState(false);

      // Scan state
      const [scannedRaces, setScannedRaces] = useState(new Map());
      const [scanModalRace, setScanModalRace] = useState(null);
      const [currentPP, setCurrentPP] = useState(null);
      const [currentOdds, setCurrentOdds] = useState(null);

      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [progress, setProgress] = useState('');
      const [progressSteps, setProgressSteps] = useState([]);
      const [copied, setCopied] = useState(false);

      useEffect(() => { if (apiKey) localStorage.setItem('postTime_apiKey', apiKey); }, [apiKey]);
      useEffect(() => { localStorage.setItem('postTime_model', selectedModel); }, [selectedModel]);

      // When track changes, refresh the set of races that have been scanned
      useEffect(() => {
        if (selectedTrack) setScannedRaces(getRacesWithPP(selectedTrack.slug, selectedDate));
      }, [selectedTrack, selectedDate]);

      // When a race is selected, load its PP data and live odds if any
      useEffect(() => {
        if (selectedTrack && selectedRace) {
          setCurrentPP(loadPPData(selectedTrack.slug, selectedDate, selectedRace.raceNumber));
          setCurrentOdds(loadOddsData(selectedTrack.slug, selectedDate, selectedRace.raceNumber));
        } else {
          setCurrentPP(null);
          setCurrentOdds(null);
        }
      }, [selectedTrack, selectedRace, selectedDate]);

      const dateOptions = [];
      for (let i = 0; i < 8; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        dateOptions.push({
          value: formatDate(d),
          label: i === 0 ? `Today, ${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}`
                : i === 1 ? `Tomorrow, ${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}`
                : d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
        });
      }

      const fetchTracksForDay = async () => {
        if (!apiKey.trim()) { setError('Add your Anthropic API key first'); return; }
        setLoading(true); setError(null); setTracksForDay(null);
        setProgress('Finding tracks racing on this date...');
        try {
          const url = `https://entries.horseracingnation.com/entries-results/${selectedDate}`;
          const prompt = `Fetch this URL: ${url}

It lists all North American thoroughbred tracks running on ${selectedDate}. Parse the "Tracks" table. Skip harness tracks.

Return ONLY valid JSON:
{ "date": "${selectedDate}", "tracks": [{ "name": "Track Name", "slug": "track-slug-as-in-url", "firstPost": "12:40 PM", "totalRaces": 10, "avgFieldSize": 7.4, "totalPurses": "$221,000" }] }

The slug must match the URL path used in HTML links. Return valid JSON only.`;
          const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebFetch: true });
          setTracksForDay(data);
          setView('tracks');
        } catch (err) {
          setError(`Could not fetch tracks: ${err.message}`);
        } finally { setLoading(false); setProgress(''); }
      };

      const fetchRaceCard = async (track) => {
        setSelectedTrack(track);
        setLoading(true); setError(null); setRaceCard(null);
        setProgress(`Loading ${track.name} race card...`);
        try {
          const url = `https://entries.horseracingnation.com/entries-results/${track.slug}/${selectedDate}`;
          const prompt = `Fetch: ${url}
Parse the full race card. Return ONLY JSON:
{ "trackName": "${track.name}", "date": "${selectedDate}", "races": [{ "raceNumber": 1, "postTime": "12:40 PM", "distance": "6 1/2 Furlongs", "surface": "Dirt", "raceName": "Race 1 or stakes name", "conditions": "Brief conditions", "purse": "$7,500", "fieldSize": 9, "isStakes": false }] }
Return valid JSON only.`;
          const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebFetch: true });
          setRaceCard(data);
          setView('races');
        } catch (err) {
          setError(`Could not fetch race card: ${err.message}`);
        } finally { setLoading(false); setProgress(''); }
      };

      const fetchEntries = async (race) => {
        setSelectedRace(race);
        setLoading(true); setError(null); setEntries(null); setConditions(null);
        setProgress(`Loading entries for Race ${race.raceNumber}...`);
        try {
          const entriesUrl = `https://entries.horseracingnation.com/entries-results/${selectedTrack.slug}/${selectedDate}#race-${race.raceNumber}`;
          const entriesPrompt = `Fetch: ${entriesUrl}
Extract Race ${race.raceNumber} at ${selectedTrack.name} on ${selectedDate}. Return ONLY JSON:
{ "raceNumber": ${race.raceNumber}, "trackName": "${selectedTrack.name}", "distance": "${race.distance}", "surface": "${race.surface}", "conditions": "Full conditions", "purse": "${race.purse || ''}", "entries": [{ "postPosition": "1", "programNumber": "1", "horseName": "Name", "jockey": "Jockey", "trainer": "Trainer", "morningLine": "5-2", "weight": "118", "scratched": false }], "notes": "Scratches, etc." }
Return valid JSON only.`;

          const entriesPromise = callClaude({ apiKey, modelId: MODELS.haiku.id, prompt: entriesPrompt, useWebFetch: true });
          setConditionsLoading(true);
          const conditionsPromise = fetchConditionsInternal(race);

          const [entriesResult, conditionsResult] = await Promise.allSettled([entriesPromise, conditionsPromise]);
          if (entriesResult.status === 'rejected') throw entriesResult.reason;

          const entriesData = entriesResult.value.data;
          setEntries(entriesData);
          setHorses(entriesData.entries.filter(e => !e.scratched).map(e => ({
            postPosition: e.postPosition, name: e.horseName, jockey: e.jockey || '', trainer: e.trainer || '', morningLine: e.morningLine || ''
          })));
          if (conditionsResult.status === 'fulfilled') setConditions(conditionsResult.value);

          setView('entries');
        } catch (err) {
          setError(`Could not fetch entries: ${err.message}`);
        } finally { setLoading(false); setConditionsLoading(false); setProgress(''); }
      };

      const fetchConditionsInternal = async (race) => {
        const prompt = `Research live track conditions for ${selectedTrack.name} on ${selectedDate}.
Use web_search for: current track condition (Fast/Good/Sloppy/Muddy or Firm/Good/Yielding/Soft), today's weather, rail position, and how earlier races have been playing.

Return ONLY JSON:
{ "dirtCondition": null, "turfCondition": null, "weather": "67°F...", "railPosition": null, "earlyResults": "Race 1 (6F): speed held..." or "Not enough races yet", "playingNote": "Speed holding on dirt", "dataFreshness": "As of 2:45 PM ET" }
Use null for any field you can't determine. Return valid JSON only.`;
        const { data } = await callClaude({ apiKey, modelId: MODELS.haiku.id, prompt, useWebSearch: true });
        return data;
      };

      const refreshConditions = async () => {
        if (!selectedRace) return;
        setConditionsLoading(true);
        try { const data = await fetchConditionsInternal(selectedRace); setConditions(data); }
        catch (err) { console.error(err); }
        finally { setConditionsLoading(false); }
      };

      const runAnalysis = async () => {
        const validHorses = horses.filter(h => h.name.trim());
        if (validHorses.length < 2) { setError('Need at least 2 horses'); return; }

        setLoading(true); setError(null); setAnalysis(null);
        const model = MODELS[selectedModel];
        const steps = validHorses.map((h, i) => ({ id: `horse-${i}`, label: `Researching ${h.name}`, status: 'pending' }));
        steps.push({ id: 'synthesis', label: 'Pace projection, picks, exotics (synthesis)', status: 'pending' });
        setProgressSteps(steps);

        try {
          const conditionsContext = conditions ? `
LIVE TRACK CONDITIONS:
- Dirt: ${conditions.dirtCondition || 'N/A'}
- Turf: ${conditions.turfCondition || 'N/A'}
- Weather: ${conditions.weather || 'N/A'}
- Rail: ${conditions.railPosition || 'Default'}
- Playing: ${conditions.playingNote || 'Insufficient data'}
- Early results: ${conditions.earlyResults || 'N/A'}
` : '';

          // Phase 1: per-horse research, with PP data injected if available
          const horseResearch = [];
          const concurrency = 3;
          for (let i = 0; i < validHorses.length; i += concurrency) {
            const batch = validHorses.slice(i, i + concurrency);
            const batchResults = await Promise.all(batch.map(async (h, batchIdx) => {
              const stepIdx = i + batchIdx;
              setProgressSteps(prev => prev.map((s, idx) => idx === stepIdx ? { ...s, status: 'active' } : s));

              // Find this horse in PP data (name match)
              const ppHorse = currentPP?.horses?.find(pph =>
                pph.horseName?.toLowerCase().trim() === h.name.toLowerCase().trim() ||
                pph.postPosition === h.postPosition
              );

              let ppContext = '';
              if (ppHorse) {
                const recentPPs = (ppHorse.pastPerformances || []).slice(0, 5);
                const sourceLabel = currentPP.source === 'brisnet' ? '📊 BRISNET DATA FILE (structured, authoritative)' : '📷 SCANNED PROGRAM PAGES (OCR may be imperfect)';
                const primePowerLine = ppHorse.brisPrimePower
                  ? `\n- 🔑 BRIS Prime Power: ${ppHorse.brisPrimePower} (Brisnet's flagship composite rating — strong predictor)`
                  : '';
                // Brisnet-only: pre-computed running style (E/EP/P/S) and Quirin speed points (0-8)
                const runStyleLine = ppHorse.brisRunStyle
                  ? `\n- 🏇 BRIS Run Style: ${ppHorse.brisRunStyle} (E=front, EP=press, P=stalk, S=close)`
                  : '';
                const quirinLine = ppHorse.quirinSpeedPoints != null
                  ? `\n- Quirin Speed Points: ${ppHorse.quirinSpeedPoints}/8 (higher = more early speed; 5+ is tactical)`
                  : '';
                const bestSpeedsLine = ppHorse.brisSpeedFigures
                  ? `\n- Best BRIS Speed figures: life=${ppHorse.brisSpeedFigures.bestLife ?? '?'}, this year=${ppHorse.brisSpeedFigures.bestYear ?? '?'}, fast=${ppHorse.brisSpeedFigures.bestFast ?? '?'}, turf=${ppHorse.brisSpeedFigures.bestTurf ?? '?'}, off=${ppHorse.brisSpeedFigures.bestOff ?? '?'}, this-distance=${ppHorse.brisSpeedFigures.bestDistance ?? '?'}`
                  : '';
                const pedigreeRatingsLine = ppHorse.pedigreeRatings
                  ? `\n- BRIS pedigree ratings: dirt=${ppHorse.pedigreeRatings.dirt || '?'}, mud=${ppHorse.pedigreeRatings.mud || '?'}, turf=${ppHorse.pedigreeRatings.turf || '?'}, dist=${ppHorse.pedigreeRatings.distance || '?'}`
                  : '';
                const trainerAnglesLine = (ppHorse.trainerAngles && ppHorse.trainerAngles.length)
                  ? `\n- Trainer angles today: ${ppHorse.trainerAngles.map(a => `[${a.label}: ${a.starts} starts, ${a.winPct}% win, $${a.roi} ROI]`).join(' ')}`
                  : '';

                ppContext = `
PROGRAM PP DATA — ${sourceLabel}:
- Lifetime: ${JSON.stringify(ppHorse.lifetimeRecord)}
- At this track: ${JSON.stringify(ppHorse.trackRecord)}
- At this distance: ${JSON.stringify(ppHorse.distanceRecord)}
- Turf record: ${JSON.stringify(ppHorse.turfRecord || {})}
- Wet record: ${JSON.stringify(ppHorse.wetRecord || {})}${primePowerLine}${runStyleLine}${quirinLine}${bestSpeedsLine}${pedigreeRatingsLine}${trainerAnglesLine}
- Days since last race: ${ppHorse.daysSinceLastRace ?? '?'}
- Pedigree: by ${ppHorse.sire || '?'} out of ${ppHorse.dam || '?'} (${ppHorse.damSire ? `${ppHorse.damSire} line` : 'dam sire unknown'})
- Medication: ${ppHorse.medication || 'none'} | Equipment change: ${ppHorse.equipmentChange || 'none'}
- Recent races (most recent first):
${recentPPs.map((pp, idx) => `  ${idx+1}. ${pp.date} ${pp.track || pp.trackCode} R${pp.raceNum}, ${pp.condition} ${pp.distance || pp.distanceYards + 'y'} ${pp.surface}, ${pp.raceType}${pp.raceClassification ? ` (${pp.raceClassification})` : ''}
     BRIS Speed: ${pp.beyerFig ?? '?'} | Finish: ${pp.finishPosition ?? '?'} by ${pp.beatenLengths ?? '?'} L | Post: ${pp.postPosition ?? '?'} | Field: ${pp.numEntrants ?? '?'}
     Running line: ${pp.runningLine || 'n/a'}
     Fractions: ${(pp.fractions || []).join(' ')} | Final time: ${pp.finalTime ?? '?'}${pp.brisPace?.latePace ? ` | Late pace: ${pp.brisPace.latePace}` : ''}
     Jockey: ${pp.jockey || '?'} @ ${pp.weight ?? '?'}lbs, Odds: ${pp.odds || '?'}${pp.favorite ? ' (was favorite)' : ''}${pp.tripComment ? `\n     🔔 Trip comment: "${pp.tripComment}"` : ''}${pp.topFinishers ? `\n     Top finishers: ${pp.topFinishers}` : ''}`).join('\n')}
- Workouts (last 6): ${(ppHorse.workouts || []).slice(0, 6).map(w => `${w.date} ${w.track || ''} ${w.distance || ''} in ${w.time ?? '?'}${w.bullet ? ' ★BULLET' : ''} (${w.description || ''})${w.rank ? ` ${w.rank}` : ''}`).join(' | ') || 'none'}
- Trainer stats (meet): ${JSON.stringify(ppHorse.trainerStats?.meet || {})}
- Trainer stats (YTD): ${JSON.stringify(ppHorse.trainerStats?.currentYear || {})}
- J/T combo (meet): ${JSON.stringify(ppHorse.jockeyTrainerCombo?.meet || {})}
- J/T combo (365d): ${JSON.stringify(ppHorse.jockeyTrainerCombo?.last365 || {})}

ANALYZE THIS PP DATA DIRECTLY. Key signals, in priority order:
1. **BRIS Prime Power** (if present) is Brisnet's flagship composite — the single best predictor. Rank horses against field.
2. **BRIS Run Style + Quirin Speed Points** — these pre-compute pace projection. Count the Es and EPs in the field; high Quirin points = more early speed.
3. **Trip comments** (wide, steadied, blocked, checked, bumped, greened, rank) = classic overlay signal if horse finished close despite trouble. Flag in tripNote.
4. **Speed figure trajectory** (going up, flat, regressing) matters as much as best fig.
5. **Trainer angles** — when a specific pre-computed angle (e.g. "WonLastStart", "1stLasix", "Layoff45+") shows an ROI > $2.00 with 20+ starts, that's predictive.
6. **Workout pattern** — bullets, sharp half-mile times, tight sequence = positive. Nothing fast = lukewarm.
7. **Layoff angle** — daysSinceLastRace > 45 paired with sharp works or a trainer with good off-layoff ROI.`;
              }

              const horsePrompt = `You are a professional horse racing handicapper. Research this horse and return detailed analysis.

HORSE: ${h.name} — Post ${h.postPosition}
JOCKEY: ${h.jockey} | TRAINER: ${h.trainer} | ML: ${h.morningLine}

RACE: ${selectedTrack.name} Race ${selectedRace.raceNumber}, ${selectedRace.distance} ${selectedRace.surface}
CONDITIONS: ${entries?.conditions || ''}
${conditionsContext}
${ppContext}

${ppHorse ? 'Since PP data is provided above, lean heavily on it. Web search only for news/equipment changes since the last PP.' : 'No PP data available — use web_search for recent past performances and speed figures.'}

Research priorities:
1. Last 3-5 race finishes with Beyer/speed figures
2. Running style (E = early speed, EP = early presser, P = presser/stalker, S = closer)
3. Distance/surface fit based on actual record
4. Workout pattern
5. Trainer angles (layoff, first-time, equipment change, class move)
6. Jockey fit
7. Trip bad luck in recent races (flag explicitly)

Return ONLY JSON:

{
  "postPosition": "${h.postPosition}",
  "name": "${h.name}",
  "runningStyle": "E" | "EP" | "P" | "S",
  "lastRaces": "Summary of last 3-5 races with results and figs",
  "speedFigures": "e.g. '87-92-84 last three Beyers'",
  "bestFig": 92,
  "workouts": "Recent works",
  "angles": "Positive angles",
  "concerns": "Real concerns",
  "tripNote": "Trip bad luck flag if present, otherwise null",
  "fitness": "Sharp | Developing | Questionable | Peaking | Regressing",
  "distanceSurfaceFit": "Good | Questionable | Untested | Proven",
  "projectedEarlyPos": "1-2 lengths off, 3-4 wide stalking, last in field, etc.",
  "research": "2-3 sentences on what sources/PP data told you",
  "confidence": 1-10
}

Return valid JSON only. Use null where info unavailable.`;

              try {
                const { data } = await callClaude({
                  apiKey,
                  modelId: model.id,
                  prompt: horsePrompt,
                  useWebSearch: !ppHorse, // skip web search if we have PP data
                  maxTokens: 2500
                });
                setProgressSteps(prev => prev.map((s, idx) => idx === stepIdx ? { ...s, status: 'done' } : s));
                return data;
              } catch (e) {
                setProgressSteps(prev => prev.map((s, idx) => idx === stepIdx ? { ...s, status: 'done', label: s.label + ' (partial)' } : s));
                return { postPosition: h.postPosition, name: h.name, runningStyle: 'P', lastRaces: 'Research failed', speedFigures: null, research: `Error: ${e.message}`, confidence: 5 };
              }
            }));
            horseResearch.push(...batchResults);
          }

          // Phase 2: synthesis with pace school rigor
          const synthIdx = steps.length - 1;
          setProgressSteps(prev => prev.map((s, idx) => idx === synthIdx ? { ...s, status: 'active' } : s));

          const researchSummary = horseResearch.map(h =>
            `${h.postPosition}. ${h.name}
  Style: ${h.runningStyle} | Projected early: ${h.projectedEarlyPos}
  Best fig: ${h.bestFig} | Figs: ${h.speedFigures}
  Fitness: ${h.fitness} | Dist/surf fit: ${h.distanceSurfaceFit} | Confidence: ${h.confidence}
  Angles: ${h.angles}
  Concerns: ${h.concerns}
  Trip note: ${h.tripNote || 'none'}`
          ).join('\n\n');

          const synthPrompt = `You are a professional horse racing handicapper synthesizing deep research into picks. You will follow a rigorous PACE-SCHOOL approach to projection.

RACE: ${selectedRace.raceName} (Race ${selectedRace.raceNumber})
TRACK: ${selectedTrack.name}, ${selectedDate}
DISTANCE: ${selectedRace.distance} | SURFACE: ${selectedRace.surface}
CONDITIONS: ${entries?.conditions || ''}
${conditionsContext}

PER-HORSE RESEARCH:
${researchSummary}

STEP-BY-STEP PACE ANALYSIS (do all steps rigorously):

Step 1. Identify early-speed horses (E, EP). Count them. If 3+, pace will likely be HOT. If 1, pace will likely be CONTROLLED. If 2, depends on whether they pressure each other or settle.

Step 2. Project the early leader. Who gets the lead, and is anyone pressing? Does the projected leader typically wire fields or get caught?

Step 3. Project the pace shape. Expected fractional stress: hot / honest / soft. A hot pace helps closers (S) and late-pressers (P). A slow/controlled pace helps front-runners (E) and stalkers (EP).

Step 4. Identify the pace-suited contenders. Which horses have the right style for the projected pace AND the figures/fitness to be live?

Step 5. Track bias overlay. Does today's bias (from conditions) reinforce or contradict the pace conclusion?

Step 6. Trip angle overlay. Any horses with documented trip bad luck last out (see tripNote) are candidates for improvement and may offer value beyond what raw figures suggest.

Step 7. Pick Win/Place/Show/Longshot. Win = best pace+figure combo. Longshot = value angle (trip improver, class dropper, sharp work pattern, pace-suited bomb).

Step 8. Exotic structure. Build exactas/tris/supers around pace-suited contenders; use trip-bad-luck and pace-suited bombs underneath for value.

Step 9. **Probability distribution.** Assign each horse a win probability (0.0-1.0). These must sum to approximately 1.0 across the field. Calibration guidelines: an obvious standout in a small field might be 40-50%; a chalky favorite in a competitive race 25-35%; a solid contender 10-20%; a live longshot 5-10%; a true bomb 2-4%; a pace-compromised also-ran 1-2%. NEVER assign every horse ~10% just to be safe — that's useless. Differentiate. If you're uncertain, spread probability more evenly but do not flatten entirely.

                      </span>
                    </div>
                    <div className="exotic-row"><span className="exotic-label">Early Speed</span><span style={{ color: '#d6d3d1', fontSize: '0.9rem' }}>{(analysis.paceAnalysis.earlySpeedHorses || []).map(h => `${h.postPosition}. ${h.name} (${h.style})`).join(', ') || 'None'}</span></div>
                    <div className="exotic-row"><span className="exotic-label">Leader</span><span style={{ color: '#d6d3d1', fontSize: '0.9rem' }}>{analysis.paceAnalysis.projectedLeader}</span></div>
                    <div className="exotic-row"><span className="exotic-label">Suited</span><span style={{ color: '#6ee7b7', fontFamily: 'JetBrains Mono, monospace' }}>{(analysis.paceAnalysis.paceSuitedStyles || []).join(', ')}</span></div>
                    <p className="exotic-notes">{analysis.paceAnalysis.paceReasoning}</p>
                  </div>
                </section>
              )}

              {analysis.tripAngles && analysis.tripAngles.toLowerCase() !== 'none' && analysis.tripAngles.toLowerCase() !== 'none noted' && (
                <section>
                  <div className="pace-box mint" style={{ padding: '0.75rem 1rem' }}>
                    <div className="pace-label">Trip Angles</div>
                    <p style={{ margin: 0 }}>{analysis.tripAngles}</p>
                  </div>
                </section>
              )}

              {/* v7: Value School — Overlay detection */}
              {overlays && overlays.length > 0 && (
                <section>
                  <h3>
                    <span style={{ color: '#fcd34d' }}>💰</span> Value Analysis
                  </h3>
                  <p style={{ color: '#a8a29e', fontSize: '0.875rem', marginBottom: '1rem', fontStyle: 'italic' }}>
                    Comparing AI's probability estimates against live tote odds (captured {currentOdds?.capturedAt ? new Date(currentOdds.capturedAt).toLocaleTimeString() : '?'} — odds shift until post).
                  </p>

                  {/* Bankroll input for Kelly */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem', padding: '0.5rem 0.75rem', background: 'rgba(28, 25, 23, 0.4)', border: '1px solid #292524' }}>
                    <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.2em', color: '#78716c', textTransform: 'uppercase' }}>Bankroll</span>
                    <span style={{ color: '#a8a29e' }}>$</span>
                    <input
                      type="number"
                      value={bankroll}
                      onChange={e => setBankroll(parseFloat(e.target.value) || 0)}
                      style={{ width: '80px', padding: '0.25rem 0.4rem', fontSize: '0.9rem' }}
                      min="1"
                      step="10"
                    />
                    <span style={{ fontSize: '0.75rem', color: '#78716c', fontStyle: 'italic', flex: 1 }}>
                      Kelly sizing uses ¼-Kelly (conservative) for this race
                    </span>
                  </div>

                  <div className="overlay-grid">
                    {overlays.map((row, idx) => (
                      <div key={idx} className="overlay-row" style={{ borderLeftColor: row.overlay?.color || '#44403c' }}>
                        <div className="overlay-horse">
                          <span className="overlay-post">{row.postPosition}</span>
                          <span className="overlay-name">{row.name}</span>
                          {row.overlay && row.overlay.tier !== 'fair' && (
                            <span className="overlay-badge" style={{ color: row.overlay.color, borderColor: row.overlay.color }}>
                              {row.overlay.label}
                            </span>
                          )}
                        </div>
                        <div className="overlay-numbers">
                          <div className="overlay-num">
                            <div className="overlay-num-label">Tote</div>
                            <div className="overlay-num-value">
                              {row.currentOddsText}
                              {row.oddsDirection === 'up' && <span style={{ color: '#6ee7b7', marginLeft: '0.2rem' }}>↑</span>}
                              {row.oddsDirection === 'down' && <span style={{ color: '#fb7185', marginLeft: '0.2rem' }}>↓</span>}
                            </div>
                            <div className="overlay-num-sub">{(row.toteProb * 100).toFixed(0)}%</div>
                          </div>
                          <div className="overlay-num">
                            <div className="overlay-num-label">AI</div>
                            <div className="overlay-num-value" style={{ color: '#6ee7b7' }}>{(row.aiProb * 100).toFixed(0)}%</div>
                            <div className="overlay-num-sub">est. win</div>
                          </div>
                          <div className="overlay-num">
                            <div className="overlay-num-label">Edge</div>
                            <div className="overlay-num-value" style={{ color: row.edge > 0 ? '#6ee7b7' : '#78716c' }}>
                              {row.edge > 0 ? '+' : ''}{(row.edge * 100).toFixed(1)}%
                            </div>
                            <div className="overlay-num-sub">{row.overlay?.ratio ? row.overlay.ratio.toFixed(2) + 'x' : ''}</div>
                          </div>
                          {row.kelly > 0 && (
                            <div className="overlay-num">
                              <div className="overlay-num-label">¼ Kelly</div>
                              <div className="overlay-num-value" style={{ color: '#fcd34d' }}>${row.kelly.toFixed(0)}</div>
                              <div className="overlay-num-sub">to win</div>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Summary */}
                  {(() => {
                    const realOverlays = overlays.filter(r => r.overlay && ['small', 'meaningful', 'big'].includes(r.overlay.tier));
                    const topBet = overlays.find(r => r.kelly > 0);
                    if (realOverlays.length === 0) {
                      return <div className="exotic-notes">No meaningful overlays detected — the market is pricing this race close to the AI's estimate. Straight bets don't look +EV here.</div>;
                    }
                    return (
                      <div className="exotic-notes">
                        <strong style={{ color: '#fcd34d' }}>{realOverlays.length} overlay{realOverlays.length !== 1 ? 's' : ''} found.</strong>{' '}
                        {topBet ? `Biggest value: ${topBet.name} at ${topBet.currentOddsText}. Kelly-sized suggestion: $${topBet.kelly.toFixed(0)} to win.` : ''}
                        {' '}Remember odds drift until post — recheck the tote 1-2 min out.
                      </div>
                    );
                  })()}
                </section>
              )}

              {/* Prompt to add odds if we have analysis but no odds yet */}
              {analysis.probabilityDistribution && !currentOdds && (
                <section>
                  <div className="exotics-box" style={{ borderLeft: '3px solid #fcd34d' }}>
                    <div className="pace-label" style={{ color: '#fcd34d' }}>💡 Unlock Value Analysis</div>
                    <p style={{ margin: '0.5rem 0', color: '#d6d3d1' }}>
                      Screenshot the TwinSpires Advanced tab (or any live tote display) and the app will compare AI probabilities to the tote and flag overlays.
                    </p>
                    <button className="ghost-btn" onClick={() => openScanModal(selectedRace)} style={{ marginTop: '0.5rem' }}>
                      <IconScan /> Add Live Odds
                    </button>
                  </div>
                </section>
              )}

              <section>
                <h3><IconTrophy /> The Picks</h3>
                <div className="picks-grid">
                  {[{ key: 'win', label: 'Win' }, { key: 'place', label: 'Place' }, { key: 'show', label: 'Show' }, { key: 'longshot', label: 'Longshot' }].map(({ key, label }) => {
                    const pick = analysis.topPicks[key];
                    return (
                      <div key={key} className={`pick-card ${key}`}>
                        <div className="pick-label">{label}</div>
                        <div className="pick-name"><span className="post">{pick.postPosition}.</span> {pick.name}</div>
                        <p className="pick-reasoning">{pick.reasoning}</p>
                      </div>
                    );
                  })}
                </div>
              </section>

              <section className="exotics-box">
                <h3><IconTrend /> Exotic Wagers</h3>
                <div className="exotic-row"><span className="exotic-label">Exacta</span><span className="exotic-value">{analysis.exotics.exacta}</span></div>
                <div className="exotic-row"><span className="exotic-label">Trifecta</span><span className="exotic-value">{analysis.exotics.trifecta}</span></div>
                <div className="exotic-row"><span className="exotic-label">Superfecta</span><span className="exotic-value">{analysis.exotics.superfecta}</span></div>
                <p className="exotic-notes">{analysis.exotics.notes}</p>
              </section>

              <section>
                <h3>Horse-by-Horse</h3>
                {[...analysis.horses].sort((a, b) => b.confidence - a.confidence).map((horse, idx) => (
                  <div key={idx} className="horse-result">
                    <div className="horse-result-header">
                      <div className="horse-result-name"><span className="post">{horse.postPosition}.</span> {horse.name}</div>
                      <div className="horse-result-meta">
                        <span className="running-style">{horse.runningStyle}</span>
                        {horse.tripNote && <span className="trip-flag">⚑ Trip angle</span>}
                        <span className="confidence" style={{ color: confidenceColor(horse.confidence) }}>{horse.confidence}<span className="denom">/10</span></span>
                      </div>
                    </div>
                    <div className="confidence-bar"><div className="confidence-fill" style={{ width: `${(horse.confidence / 10) * 100}%` }}></div></div>
                    <div className="horse-detail-grid">
                      <div><div className="detail-label">Key Stats</div><p className="detail-text">{horse.keyStats}</p></div>
                      <div><div className="detail-label strength">Strengths</div><p className="detail-text">{horse.strengths}</p></div>
                      <div><div className="detail-label concern">Concerns</div><p className="detail-text">{horse.concerns}</p></div>
                      <div><div className="detail-label verdict">Verdict</div><p className="detail-text verdict">{horse.verdict}</p></div>
                    </div>
                    {horse.tripNote && (
                      <div className="reasoning-box" style={{ borderLeftColor: '#fcd34d' }}>
                        <div className="research-label" style={{ color: '#fcd34d' }}>Trip Note</div>
                        {horse.tripNote}
                      </div>
                    )}
                    {showReasoning && (horse.research || horse.lastRaces || horse.workouts || horse.projectedEarlyPos) && (
                      <div className="reasoning-box">
                        <div className="research-label">Research Notes</div>
                        {horse.projectedEarlyPos && <div><strong>Projected early position:</strong> {horse.projectedEarlyPos}</div>}
                        {horse.lastRaces && <div style={{ marginTop: '0.4rem' }}><strong>Last races:</strong> {horse.lastRaces}</div>}
                        {horse.workouts && <div style={{ marginTop: '0.4rem' }}><strong>Works:</strong> {horse.workouts}</div>}
                        {horse.research && <div style={{ marginTop: '0.4rem' }}>{horse.research}</div>}
                      </div>
                    )}
                  </div>
                ))}
              </section>

              <section className="summary-section">
                <div className="pace-label">Final Word</div>
                <p className="summary-quote">"{analysis.summary}"</p>
              </section>

              <div className="footer-note">AI analysis · Not financial advice · Bet responsibly</div>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW failed:', err));
      });
    }
    let deferredPrompt;
    const installPrompt = document.getElementById('installPrompt');
    const installBtn = document.getElementById('installBtn');
    const dismissBtn = document.getElementById('dismissInstall');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('install_dismissed')) installPrompt.classList.add('show');
    });
    installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installPrompt.classList.remove('show');
    });
    dismissBtn?.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('install_dismissed', '1');
    });
  </script>
</body>
</html>
